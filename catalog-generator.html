<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>קורסי תעשיידע</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   SCREEN — Selection UI
═══════════════════════════════════════════════ */
@media screen {
  *, *::before, *::after { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0 0 80px;
    font-family: "Assistant", Arial, sans-serif;
    background: #EEF3F8;
    direction: rtl;
    color: #1E2D3D;
    min-height: 100vh;
  }

  #print-area { display: none; }

  /* — Header — */
  .ui-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 24px;
    background: #fff;
    border-bottom: 1px solid #D8E4EE;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .ui-header-logo { height: 34px; width: auto; }
  .ui-header h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 900;
    color: #1A3050;
  }
  .ui-header-back {
    margin-right: auto;
    font-size: 13px;
    color: #5A7A9A;
    text-decoration: none;
    font-weight: 700;
    border: 1px solid #C8D8E8;
    border-radius: 999px;
    padding: 5px 14px;
    background: #fff;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .ui-header-back:hover { background: #EEF3F8; }

  /* — Levels grid — */
  .levels-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    padding: 20px 20px 0;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* — Level column — */
  .level-col {
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    display: flex;
    flex-direction: column;
  }

  .level-col-header {
    padding: 14px 18px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .level-col-header.elem  { background: #1C6A44; }
  .level-col-header.mid   { background: #1E4FA0; }
  .level-col-header.high  { background: #5A2D8A; }

  .level-col-title {
    font-size: 18px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.01em;
  }
  .level-col-count {
    font-size: 12px;
    font-weight: 700;
    color: rgba(255,255,255,0.75);
  }

  .btn-print-level {
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 999px;
    background: rgba(255,255,255,0.14);
    color: #fff;
    font-family: "Assistant", Arial, sans-serif;
    font-size: 12px;
    font-weight: 800;
    padding: 5px 13px;
    cursor: pointer;
    transition: background 0.14s;
    white-space: nowrap;
  }
  .btn-print-level:hover { background: rgba(255,255,255,0.25); }

  /* — Course list in column — */
  .level-courses {
    padding: 8px 0;
    flex: 1;
  }

  .course-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    cursor: pointer;
    transition: background 0.1s;
    border-bottom: 1px solid #F0F4F8;
  }
  .course-item:last-child { border-bottom: none; }
  .course-item:hover { background: #F5F8FC; }
  .course-item.selected { background: #EEF4FF; }

  .course-item input[type=checkbox] {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    cursor: pointer;
    accent-color: #2B5580;
  }

  .course-item-title {
    font-size: 14px;
    font-weight: 700;
    color: #1E2D3D;
    flex: 1;
    line-height: 1.3;
  }
  .course-item-gefen {
    font-size: 11px;
    font-weight: 600;
    color: #8A9BB0;
    white-space: nowrap;
  }

  /* — Select-all row — */
  .level-select-all {
    padding: 8px 16px 6px;
    border-top: 1px solid #EEF2F8;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-select-level {
    font-family: "Assistant", Arial, sans-serif;
    font-size: 12px;
    font-weight: 800;
    color: #5A7A9A;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .btn-select-level:hover { color: #1A3050; }

  /* — Action bar — */
  .action-bar {
    position: fixed;
    bottom: 0;
    right: 0;
    left: 0;
    background: #fff;
    border-top: 1px solid #D0DEE8;
    padding: 11px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 100;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.07);
    flex-wrap: wrap;
  }

  .selected-count {
    font-size: 14px;
    font-weight: 700;
    color: #5A7A9A;
    white-space: nowrap;
  }
  .selected-count strong { color: #2B5580; }

  .marketer-field {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 12px;
    border: 1px solid #D0DEE8;
    border-radius: 999px;
    background: rgba(255,255,255,.92);
  }
  .marketer-label {
    font-size: 13px;
    font-weight: 900;
    color: #172033;
    white-space: nowrap;
  }
  .marketer-select {
    font-size: 13px;
    font-weight: 700;
    border: none;
    background: transparent;
    cursor: pointer;
    color: #172033;
    outline: none;
    font-family: "Assistant", Arial, sans-serif;
  }

  .btn-action {
    border: none;
    border-radius: 999px;
    padding: 10px 22px;
    font-family: "Assistant", Arial, sans-serif;
    font-size: 14px;
    font-weight: 900;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    white-space: nowrap;
  }
  .btn-opening {
    background: #EEF3F8;
    color: #1A3050;
    border: 1px solid #C8D8E8;
  }
  .btn-opening:hover { background: #DDE8F2; }

  .btn-selected {
    background: #2B5580;
    color: #fff;
    margin-right: auto;
  }
  .btn-selected:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-selected:not(:disabled):hover { background: #1A3F62; }

  .btn-full {
    background: #1C6A44;
    color: #fff;
  }
  .btn-full:hover { background: #155233; }
}

/* ═══════════════════════════════════════════════
   A4 PAGE STYLES  (screen + print)
═══════════════════════════════════════════════ */
.a4 {
  width: 210mm;
  min-height: 297mm;
  background: #ffffff;
  font-family: "Assistant", Arial, sans-serif;
  direction: rtl;
  position: relative;
  box-sizing: border-box;
  padding: 10mm 13mm 8mm;
  display: flex;
  flex-direction: column;
  font-size: 10.5px;
}

/* — Reset browser markers / circles — */
.a4 h1::before, .a4 h2::before, .a4 h3::before,
.a4 p::before,  .a4 .section-title::before { content: none !important; display: none !important; }
.a4 ul, .a4 ol { list-style: none; margin: 0; padding: 0; }

/* — Top Meta Row (courseLayout) — */
.top-meta-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 7px;
}
.top-meta-logo { width: 56px; height: auto; }
.top-meta-label {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  flex-wrap: wrap;
  background: var(--c4);
  border: 1px solid var(--c3);
  border-radius: 999px;
  padding: 4px 14px;
}
.meta-main  { font-size: 9px; font-weight: 800; color: var(--c0); }
.meta-value { font-size: 9px; color: var(--c0); font-weight: 600; }
.meta-separator {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--c2);
  display: inline-block;
}

/* — Contact line (marketer) at bottom of opening letter — */
.page-contact {
  text-align: center;
  font-size: 11.5px;
  font-weight: 700;
  color: #1e3a5f;
  direction: rtl;
  letter-spacing: 0.01em;
  margin-top: auto;
  padding-top: 8mm;
}

/* — Opening sentence — */
.a4-opening {
  font-size: 9.5px;
  font-style: italic;
  color: var(--c0);
  text-align: center;
  border: 1px solid var(--c3);
  background: var(--c4);
  border-radius: 8px;
  padding: 6px 12px;
  margin: 0 0 10px;
  line-height: 1.55;
  display: block;
}

/* — Banner — */
.a4-banner {
  background: var(--c0);
  color: #fff;
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  position: relative;
  break-inside: avoid;
  page-break-inside: avoid;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
.a4-banner-text { flex: 1; min-width: 0; }
.a4-title    { font-size: 19px; font-weight: 900; margin: 0 0 4px; line-height: 1.2; }
.a4-subtitle { font-size: 11px; font-weight: 800; margin: 0 0 7px; color: rgba(255,255,255,0.96); }
.a4-badges   { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
.badge {
  background: rgba(255,255,255,0.18);
  border-radius: 999px;
  padding: 2px 8px;
  font-size: 8.5px;
  font-weight: 700;
  color: #fff;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
.badge-domain { background: rgba(255,255,255,0.12); }
.a4-gefen { font-size: 8.5px; font-weight: 700; margin-bottom: 4px; opacity: 0.82; }
.gefen-label { opacity: 0.75; margin-left: 3px; }
.a4-logo { width: 46px; height: auto; flex-shrink: 0; }

/* — Body — */
.a4-body {
  display: flex;
  flex-direction: column;
  gap: 7px;
  margin-bottom: auto;
}

/* — Info sections — */
.info-section {
  border-radius: 9px;
  border: 1px solid #DDE5EC;
  background: #fff;
  padding: 7px 11px;
}
.section-title {
  font-size: 8.5px;
  font-weight: 800;
  color: var(--c0);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 4px;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
.section-body {
  font-size: 10px;
  line-height: 1.52;
  color: #2A3A4A;
}

/* — Split grid — */
.split-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.mini-card, .skills-card, .outcome-card, .school-card {
  border-radius: 9px;
  border: 1px solid #DDE5EC;
  background: #fff;
  padding: 7px 11px;
}

/* — Pills — */
.pill-row { display: flex; flex-wrap: wrap; gap: 4px; }
.pill {
  background: rgba(var(--theme-rgb),0.09);
  border: 1px solid rgba(var(--theme-rgb),0.22);
  border-radius: 999px;
  padding: 3px 8px;
  font-size: 9px;
  font-weight: 700;
  color: var(--c0);
}

/* — Skills tags — */
.skills-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 2px; }
.skill-tag {
  padding: 3px 8px;
  border-radius: 999px;
  border: 1px solid rgba(var(--theme-rgb),0.24);
  background: rgba(var(--theme-rgb),0.075);
  color: var(--c0);
  font-size: 9px;
  font-weight: 800;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

/* — Skill groups — */
.skills-group-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 7px;
  width: 100%;
  margin-top: 4px;
}
.skill-group-card {
  background: #fff;
  border: 1px solid rgba(var(--theme-rgb),0.22);
  border-radius: 7px;
  padding: 8px 10px 9px;
  box-sizing: border-box;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
.skill-group-title {
  font-size: 8.5px;
  font-weight: 800;
  color: var(--c0);
  margin-bottom: 5px;
  padding-bottom: 4px;
  border-bottom: 1px solid rgba(var(--theme-rgb),0.15);
  line-height: 1.3;
}
.skill-group-items { display: flex; flex-direction: column; gap: 2px; }
.skill-group-item { font-size: 8px; line-height: 1.5; color: #3A4A58; font-weight: 600; }

/* — Outcomes — */
.outcome-box-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0,1fr));
  gap: 6px;
  margin-top: 2px;
}
.inline-outcomes-wrap {
  background: var(--c4);
  border: 1px solid var(--c3);
  border-radius: 8px;
  padding: 6px 10px;
  margin-top: 5px;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
.inline-outcomes-label {
  font-size: 8px;
  font-weight: 800;
  color: var(--c0);
  margin-bottom: 4px;
}
.inline-outcomes-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.outcome-item {
  padding: 5px 8px;
  border-radius: 8px;
  border: 1px solid var(--c3);
  background: #F8FAFC;
  color: #1E2D3D;
  font-size: 9px;
  font-weight: 800;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

/* — Domain strip — */
.program-domain-strip {
  font-size: 8.5px;
  font-weight: 700;
  color: var(--c0);
  background: var(--c4);
  border-radius: 6px;
  padding: 3px 8px;
  margin: 2px 0;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

/* — Syllabus — */
.syllabus-wrap { margin: 4px 0; }
.syllabus-header {
  font-size: 8.5px;
  font-weight: 800;
  color: var(--c0);
  background: #fff;
  border-radius: 6px 6px 0 0;
  padding: 4px 8px;
  border: 1px solid #DDE5EC;
  border-bottom: none;
}
.syllabus-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 9.5px;
  table-layout: fixed;
}
.syllabus-table th {
  background: var(--c0);
  color: #fff;
  font-size: 9px;
  padding: 4px 7px;
  font-weight: 700;
  text-align: center;
  border-left: 1px solid rgba(255,255,255,0.2);
  border-bottom: 1px solid #DDE5EC;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
.syllabus-table th:last-child { border-left: none; text-align: right; }
.syllabus-table td {
  padding: 4px 7px;
  border-bottom: 1px solid #EEF2F7;
  border-left: 1px solid #EEF2F7;
  vertical-align: top;
}
.syllabus-table td:last-child { border-left: none; }
.syllabus-table tr:nth-child(even) td { background: #FAFBFC; }
.syllabus-table th:first-child,
.syllabus-table td:first-child { width: 48px; text-align: center; }
.syllabus-table th:nth-child(2),
.syllabus-table td:nth-child(2) { width: 152px; }
.syl-num { color: var(--c0); font-weight: 700; font-size: 9px; text-align: center; }
.syl-topic { font-weight: 600; color: #3E5268; }
.syl-desc { color: #3A4A58; }

/* — Learning flow — */
.learning-flow-strip {
  display: flex;
  gap: 4px;
  margin-bottom: 8px;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
.learning-flow-step {
  flex: 1;
  text-align: center;
  background: var(--c4);
  border: 1px solid var(--c3);
  border-radius: 6px;
  padding: 4px 6px;
  font-size: 8.5px;
  font-weight: 800;
  color: var(--c0);
}

/* — School value — */
.school-value-after-syllabus { margin-top: 28px; }
.school-card .section-body,
.school-value-after-syllabus .section-body {
  font-size: 11.5px;
  line-height: 1.62;
  color: #1E2D3D;
  font-weight: 600;
}
.school-card,
.school-value-after-syllabus {
  padding: 10px 14px;
  border-color: var(--c3);
  background: var(--c4);
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

/* — Footer — */
.a4-footer {
  border-top: 1px solid var(--c3);
  margin-top: auto;
  padding-top: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.a4-footer-brand {
  font-size: 8px;
  font-weight: 700;
  color: var(--c2);
  letter-spacing: 0.03em;
}

/* — A4 page wrapper (screen preview) — */
@media screen {
  #print-area { display: none; }
  .a4-page-wrap { margin: 0; }
}

/* — Print: one A4 page per wrap — */
@media print {
  body { background: #fff; padding: 0; }
  .ui-header, .levels-grid, .action-bar { display: none !important; }
  #print-area { display: block !important; }
  .a4-page-wrap {
    page-break-after: always;
    break-after: page;
  }
  .a4-page-wrap:last-child {
    page-break-after: avoid;
    break-after: avoid;
  }
}
</style>
</head>
<body>

<!-- ── Header ── -->
<div class="ui-header">
  <img class="ui-header-logo" src="logo.png" alt="תעשיידע">
  <h1>קורסי תעשיידע</h1>
  <a class="ui-header-back" href="index.html">← חזרה</a>
</div>

<!-- ── 3-Column Levels Grid ── -->
<div class="levels-grid" id="levelsGrid">
  <!-- Populated by JS -->
</div>

<!-- ── Print area ── -->
<div id="print-area"></div>

<!-- ── Fixed action bar ── -->
<div class="action-bar">
  <span class="selected-count">נבחרו <strong id="selectedCount">0</strong> קורסים</span>

  <div class="marketer-field">
    <span class="marketer-label">שיווק:</span>
    <select id="marketerSelect" class="marketer-select">
      <option value="none">ללא שיווק</option>
      <option value="yael">יעל אביב</option>
      <option value="israa">איסראא אבו-ראס</option>
    </select>
  </div>

  <button class="btn-action btn-opening" onclick="openLetter()">מכתב מקדים</button>
  <button class="btn-action btn-selected" id="generateBtn" disabled onclick="generatePDF()">הפק קטלוג לנבחרים</button>
  <button class="btn-action btn-full" onclick="generateFullCatalog()">הפק קטלוג מלא</button>
</div>

<script>
let programs    = [];
let selectedIds = new Set();

const LOGO = "logo.png";

const LEVELS = [
  { key: "יסודי",  cls: "elem",  keys: ["elementary","elementary-middle"],  label: "יסודי" },
  { key: "חטיבה", cls: "mid",   keys: ["middle","middle-high"],             label: "חטיבת ביניים" },
  { key: "תיכון",  cls: "high",  keys: ["high","high-middle"],               label: "תיכון" },
];

/* ── Utilities ── */
function escapeHtml(v) {
  return String(v ?? "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}
function hexToRgbString(hex) {
  const c = String(hex||"").replace("#","").trim();
  if (!/^[0-9a-fA-F]{6}$/.test(c)) return "78,104,128";
  return [0,2,4].map(i=>parseInt(c.slice(i,i+2),16)).join(",");
}
function cleanGradeLabel(v) { return String(v||"").replace(/^כיתות\s+/,"").trim(); }

function stableProgramId(p={}) {
  const id = String(p.id??"").trim();
  if (id) return id;
  const g = String(p.gefen??"").trim();
  if (g) return `gefen-${g.replace(/\s+/g,"-")}`;
  return String(p.title??"program").trim().toLowerCase().replace(/[^\p{L}\p{N}]+/gu,"-").replace(/^-+|-+$/g,"")||"program";
}

function normalizeProgram(p={}) {
  const text = ["gefen","activityNo","catalogSection","itemType","title","subtitle","grades","domain","sessions","duration","opening","core","short","goals","flow","develops","outcome","school"];
  const n = {...p};
  text.forEach(f=>{n[f]=String(p[f]??"");});
  n.id            = stableProgramId(p);
  n.audienceLevel = String(p.audienceLevel??"").trim();
  n.skills        = Array.isArray(p.skills)      ? p.skills.filter(Boolean)                                    : [];
  n.skillGroups   = Array.isArray(p.skillGroups) ? p.skillGroups.filter(g=>g&&typeof g==="object"&&g.title)    : [];
  n.syllabus      = Array.isArray(p.syllabus)    ? p.syllabus                                                  : [];
  n.c0 = p.c0||"#2F6F68"; n.c1=p.c1||"#3B8C7F"; n.c2=p.c2||"#6FAFA5";
  n.c3 = p.c3||"#CFE7E1"; n.c4=p.c4||"#EEF8F5"; n.c5=p.c5||n.c0; n.c6=p.c6||n.c1;
  n.courseLayout      = Boolean(p.courseLayout);
  n.showLearningFlow  = Boolean(p.showLearningFlow);
  n.showInlineOutcomes= Boolean(p.showInlineOutcomes);
  return n;
}

function getLevelDef(p) {
  return LEVELS.find(lv => lv.keys.includes(p.audienceLevel)) || null;
}

/* ── Build functions ── */
function buildTopMetaLabel(p) {
  const items = [
    `<span class="meta-main">מספר גפ״ן: ${escapeHtml(p.gefen)}</span>`,
    `<span class="meta-value">${escapeHtml(cleanGradeLabel(p.grades))}</span>`,
    `<span class="meta-value">${escapeHtml(p.sessions)}</span>`,
    `<span class="meta-value">${escapeHtml(p.duration)}</span>`,
  ];
  return `<div class="top-meta-row">
    <img class="top-meta-logo" src="${LOGO}" alt="לוגו תעשיידע">
    <div class="top-meta-label">${items.map((it,i)=>i>0?`<span class="meta-separator"></span>${it}`:it).join("")}</div>
  </div>`;
}

function buildLearningFlow() {
  const steps = ["חוקרים","מתכננים","מפתחים","משפרים","מציגים"];
  return `<div class="learning-flow-strip">${steps.map(s=>`<div class="learning-flow-step">${escapeHtml(s)}</div>`).join("")}</div>`;
}

function getOutcomeItems(p) {
  return String(p.outcome||"").split(/\n|•/).map(s=>s.trim()).filter(Boolean);
}

function buildOutcome(p, mode="default") {
  const items = getOutcomeItems(p);
  if (items.length > 1) {
    const cls = mode==="inline" ? "inline-outcomes-grid" : "outcome-box-grid";
    return `<div class="${cls}">${items.map(it=>`<div class="outcome-item">${escapeHtml(it)}</div>`).join("")}</div>`;
  }
  return `<div class="section-body">${escapeHtml(p.outcome||"")}</div>`;
}

function buildSkills(p) {
  const items = Array.isArray(p.skills)&&p.skills.length ? p.skills : String(p.develops||"").split(",").map(s=>s.trim()).filter(Boolean);
  return items.map(s=>`<span class="pill">${escapeHtml(s)}</span>`).join("");
}

function buildSkillsTags(p) {
  const items = Array.isArray(p.skills)&&p.skills.length ? p.skills : String(p.develops||"").split(",").map(s=>s.trim()).filter(Boolean);
  return `<div class="skills-tags">${items.map(it=>`<span class="skill-tag">${escapeHtml(it)}</span>`).join("")}</div>`;
}

function buildSkillsGroups(p) {
  if (Array.isArray(p.skillGroups)&&p.skillGroups.length) {
    const cards = p.skillGroups.map(g=>{
      const title = escapeHtml(g.title||"");
      const items = Array.isArray(g.items) ? g.items.map(it=>`<div class="skill-group-item">${escapeHtml(it)}</div>`).join("") : "";
      return `<div class="skill-group-card"><div class="skill-group-title">${title}</div><div class="skill-group-items">${items}</div></div>`;
    }).join("");
    return `<div class="skills-group-grid">${cards}</div>`;
  }
  return buildSkillsTags(p);
}

function buildCourseDescription(p) {
  const paras = String(p.goals||"").split(/\n\s*\n/).map(s=>s.trim()).filter(Boolean);
  let html = p.showLearningFlow ? buildLearningFlow() : "";
  html += paras.map(par=>`<p style="margin:0 0 4px">${escapeHtml(par)}</p>`).join("");
  if (p.showInlineOutcomes) {
    html += `<div class="inline-outcomes-wrap"><div class="inline-outcomes-label">תוצרי סיום</div>${buildOutcome(p,"inline")}</div>`;
  }
  return html || escapeHtml(p.goals||"");
}

function syllabusStageClass(n) {
  const num=Number(n);
  if(num>=1&&num<=4) return "stage-nature";
  if(num>=5&&num<=6) return "stage-tech";
  if(num>=7&&num<=10) return "stage-product";
  return "";
}

function buildSyllabus(p) {
  const rows = Array.isArray(p.syllabus)?p.syllabus:[];
  if(!rows.length) return "";
  return `<div class="syllabus-wrap">
<div class="syllabus-header">סילבוס הקורס</div>
<table class="syllabus-table">
<thead><tr><th>מפגש</th><th style="text-align:right">נושא</th><th style="text-align:right">תיאור</th></tr></thead>
<tbody>${rows.map(r=>`<tr class="${syllabusStageClass(r.n)}">
<td class="syl-num">${escapeHtml(r.n)}</td>
<td class="syl-topic">${escapeHtml(r.topic)}</td>
<td class="syl-desc">${escapeHtml(r.desc)}</td>
</tr>`).join("")}</tbody>
</table></div>`;
}

/* ── Render single program as A4 HTML ── */

  const style = `--c0:${p.c0};--c1:${p.c1};--c2:${p.c2};--c3:${p.c3};--c4:${p.c4};--c5:${p.c5};--c6:${p.c6};--theme-rgb:${hexToRgbString(p.c1)}`;

  if (p.courseLayout) {
    return `<div class="a4" style="${style}">
${buildTopMetaLabel(p)}
<p class="a4-opening">${escapeHtml(p.opening)}</p>
<div class="a4-banner">
  <div class="a4-banner-text">
    <h1 class="a4-title">${escapeHtml(p.title)}</h1>
    <p class="a4-subtitle">${escapeHtml(p.subtitle)}</p>
    <div class="a4-badges"><span class="badge badge-domain">${escapeHtml(p.domain)}</span></div>
  </div>
</div>
<div class="a4-body">
  <section class="info-section">
    <div class="section-title">תקציר</div>
    <div class="section-body">${escapeHtml(p.short)}</div>
  </section>
  <section class="info-section">
    <div class="section-body">${escapeHtml(p.core)}</div>
  </section>
  <section class="info-section">
    <div class="section-title">תיאור הקורס</div>
    <div class="section-body">${buildCourseDescription(p)}</div>
  </section>
  <section class="info-section">
    <div class="section-title">כלים ומיומנויות</div>
    <div class="section-body">${buildSkillsGroups(p)}</div>
  </section>
  <div class="program-domain-strip">${escapeHtml(p.domain)}</div>
  ${buildSyllabus(p)}
  <section class="info-section school-value-after-syllabus">
    <div class="section-body">${escapeHtml(p.school)}</div>
  </section>
</div>
<div class="a4-footer"><span class="a4-footer-brand">© תעשיידע - תעשייה למען חינוך מתקדם</span></div>
</div>`;
  }

  return `<div class="a4" style="${style}">
<p class="a4-opening">${escapeHtml(p.opening)}</p>
<div class="a4-banner">
  <div class="a4-banner-text">
    <div class="a4-gefen"><span class="gefen-label">מס׳ גפ״ן:</span> <span class="gefen-number">${escapeHtml(p.gefen)}</span></div>
    <h1 class="a4-title">${escapeHtml(p.title)}</h1>
    <p class="a4-subtitle">${escapeHtml(p.subtitle)}</p>
    <div class="a4-badges">
      <span class="badge">${escapeHtml(p.grades)}</span>
      <span class="badge">${escapeHtml(p.sessions)}</span>
      <span class="badge">${escapeHtml(p.duration)}</span>
      <span class="badge badge-domain">${escapeHtml(p.domain)}</span>
    </div>
  </div>
  <img class="a4-logo" src="${LOGO}" alt="לוגו תעשיידע">
</div>
<div class="a4-body">
  <section class="info-section">
    <div class="section-title">על התוכנית</div>
    <div class="section-body">${escapeHtml(p.short)}</div>
  </section>
  <section class="info-section">
    <div class="section-title">הרעיון המרכזי</div>
    <div class="section-body">${escapeHtml(p.core)}</div>
  </section>
  <div class="split-grid">
    <section class="mini-card">
      <div class="section-title">איך לומדים</div>
      <div class="section-body">${escapeHtml(p.goals)}</div>
    </section>
    <section class="mini-card">
      <div class="section-title">מה עושים</div>
      <div class="section-body">${escapeHtml(p.flow)}</div>
    </section>
  </div>
  <div class="split-grid">
    <section class="skills-card">
      <div class="section-title">כלים ומיומנויות</div>
      <div class="pill-row">${buildSkills(p)}</div>
    </section>
    <section class="outcome-card">
      <div class="section-title">תוצר סיום</div>
      ${buildOutcome(p)}
    </section>
  </div>
  <section class="info-section school-card">
    <div class="section-title">ערך לבית הספר</div>
    <div class="section-body">${escapeHtml(p.school)}</div>
  </section>
  ${buildSyllabus(p)}
</div>
<div class="a4-footer"><span class="a4-footer-brand">© תעשיידע - תעשייה למען חינוך מתקדם</span></div>
</div>`;
}

/* ── Render 3-column UI ── */
function renderLevelsGrid() {
  const grid = document.getElementById("levelsGrid");
  grid.innerHTML = LEVELS.map(lv => {
    const lvPrograms = programs.filter(p => lv.keys.includes(p.audienceLevel));
    const rows = lvPrograms.map(p => {
      const checked = selectedIds.has(p.id) ? "checked" : "";
      const selCls  = selectedIds.has(p.id) ? " selected" : "";
      return `<label class="course-item${selCls}" data-id="${escapeHtml(p.id)}">
        <input type="checkbox" data-id="${escapeHtml(p.id)}" ${checked}>
        <span class="course-item-title">${escapeHtml(p.title)}</span>
        ${p.gefen ? `<span class="course-item-gefen">${escapeHtml(p.gefen)}</span>` : ""}
      </label>`;
    }).join("");

    const allSelected = lvPrograms.length > 0 && lvPrograms.every(p => selectedIds.has(p.id));

    return `<div class="level-col">
      <div class="level-col-header ${lv.cls}">
        <div>
          <div class="level-col-title">${lv.label}</div>
          <div class="level-col-count">${lvPrograms.length} קורסים</div>
        </div>
        <button class="btn-print-level" onclick="printLevel('${lv.key}')">הדפס שכבה</button>
      </div>
      <div class="level-courses" id="courses-${lv.key}">${rows}</div>
      <div class="level-select-all">
        <button class="btn-select-level" onclick="toggleSelectLevel('${lv.key}')">${allSelected ? "בטל בחירה" : "בחר הכל"}</button>
      </div>
    </div>`;
  }).join("");

  grid.querySelectorAll("input[type=checkbox]").forEach(cb => {
    cb.addEventListener("change", () => {
      const id = cb.dataset.id;
      if (cb.checked) selectedIds.add(id); else selectedIds.delete(id);
      cb.closest(".course-item").classList.toggle("selected", cb.checked);
      updateActionBar();
      refreshSelectAllButtons();
    });
  });
}

function refreshSelectAllButtons() {
  LEVELS.forEach(lv => {
    const lvPrograms = programs.filter(p => lv.keys.includes(p.audienceLevel));
    const col = document.querySelector(`.level-col:has(#courses-${lv.key}) .btn-select-level`);
    if (col && lvPrograms.length) {
      col.textContent = lvPrograms.every(p => selectedIds.has(p.id)) ? "בטל בחירה" : "בחר הכל";
    }
  });
}

function toggleSelectLevel(levelKey) {
  const lv = LEVELS.find(l => l.key === levelKey);
  if (!lv) return;
  const lvPrograms = programs.filter(p => lv.keys.includes(p.audienceLevel));
  const allSelected = lvPrograms.every(p => selectedIds.has(p.id));
  lvPrograms.forEach(p => allSelected ? selectedIds.delete(p.id) : selectedIds.add(p.id));
  renderLevelsGrid();
  updateActionBar();
}

function updateActionBar() {
  const n = selectedIds.size;
  document.getElementById("selectedCount").textContent = n;
  const btn = document.getElementById("generateBtn");
  btn.disabled = n === 0;
  btn.textContent = n === 0 ? "הפק קטלוג לנבחרים" : `הפק קטלוג – ${n} קורסים`;
}

/* ── PDF Generation ── */
function contactLineHTML(marketer) {
  if (marketer === "yael") {
    return `<div class="page-contact">לפרטים נוספים: יעל אביב &nbsp;–&nbsp; 054-7790073 &nbsp;|&nbsp; <a href="mailto:yael_aviv@think.org.il" style="color:inherit;text-decoration:none;">yael_aviv@think.org.il</a></div>`;
  }
  if (marketer === "israa") {
    return `<div class="page-contact">לפרטים נוספים: איסראא אבו-ראס &nbsp;–&nbsp; 054-5419396 &nbsp;|&nbsp; <a href="mailto:esraas@think.org.il" style="color:inherit;text-decoration:none;">esraas@think.org.il</a></div>`;
  }
  return "";
}

async function buildOpeningLetterPage(marketer) {
  try {
    const res = await fetch("opening.html", { cache: "no-store" });
    const html = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");
    const styles = Array.from(doc.querySelectorAll("style")).map(s => s.outerHTML).join("");
    const pageEl = doc.querySelector(".page");
    const pageContent = pageEl ? pageEl.innerHTML : "";
    const contact = contactLineHTML(marketer);
    return `<div class="a4-page-wrap"><div style="width:210mm;min-height:297mm;background:#fff;box-sizing:border-box;display:flex;flex-direction:column;font-family:Arial,sans-serif;direction:rtl;padding:14mm 16mm 12mm;position:relative;">${styles}<div>${pageContent}</div>${contact}</div></div>`;
  } catch(e) {
    return "";
  }
}

function openLetter() {
  window.open("opening.html", "_blank");
}

async function generatePDF() {
  const selected = programs.filter(p => selectedIds.has(p.id));
  if (!selected.length) return;
  const marketer = document.getElementById("marketerSelect").value;
  const openingPage = await buildOpeningLetterPage(marketer);
  const printArea = document.getElementById("print-area");
  printArea.innerHTML = openingPage + selected.map(p =>
    `<div class="a4-page-wrap">${renderProgram(p)}</div>`
  ).join("");
  setTimeout(() => window.print(), 150);
}

async function generateFullCatalog() {
  const marketer = document.getElementById("marketerSelect").value;
  const openingPage = await buildOpeningLetterPage(marketer);
  const printArea = document.getElementById("print-area");
  printArea.innerHTML = openingPage + programs.map(p =>
    `<div class="a4-page-wrap">${renderProgram(p)}</div>`
  ).join("");
  setTimeout(() => window.print(), 150);
}

async function printLevel(levelKey) {
  const lv = LEVELS.find(l => l.key === levelKey);
  if (!lv) return;
  const lvPrograms = programs.filter(p => lv.keys.includes(p.audienceLevel));
  if (!lvPrograms.length) return;
  const marketer = document.getElementById("marketerSelect").value;
  const openingPage = await buildOpeningLetterPage(marketer);
  const printArea = document.getElementById("print-area");
  printArea.innerHTML = openingPage + lvPrograms.map(p =>
    `<div class="a4-page-wrap">${renderProgram(p)}</div>`
  ).join("");
  setTimeout(() => window.print(), 150);
}

/* ── Init ── */
async function init() {
  try {
    const res = await fetch("catalog-data.json", { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!Array.isArray(data.programs) || !data.programs.length) throw new Error("programs ריק");
    programs = data.programs.map(p => normalizeProgram(p));
    renderLevelsGrid();
    updateActionBar();
  } catch(err) {
    document.getElementById("levelsGrid").innerHTML =
      `<div style="padding:24px;color:#c00;font-size:14px;grid-column:1/-1;">שגיאה בטעינת הנתונים: ${escapeHtml(err.message)}</div>`;
  }
}

init();
</script>
