name: Reorder programs center sections

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/reorder-programs-center-sections.yml

permissions:
  contents: write

jobs:
  reorder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move partnership routes before impact section
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          index_path = Path('programs-center/index.html')
          workflow_path = Path('.github/workflows/reorder-programs-center-sections.yml')
          html = index_path.read_text(encoding='utf-8')

          impact_marker = '    <section class="section impact-section"'
          partnerships_marker = '    <section class="section partnerships-section"'
          contact_marker = '    <section class="section contact-section"'

          impact_start = html.find(impact_marker)
          partnerships_start = html.find(partnerships_marker)
          contact_start = html.find(contact_marker)

          if min(impact_start, partnerships_start, contact_start) < 0:
              raise SystemExit('Could not find all required section markers')

          if partnerships_start < impact_start:
              print('Sections are already in the requested order')
          else:
              prefix = html[:impact_start]
              impact_section = html[impact_start:partnerships_start]
              partnerships_section = html[partnerships_start:contact_start]
              suffix = html[contact_start:]
              index_path.write_text(
                  prefix + partnerships_section + impact_section + suffix,
                  encoding='utf-8'
              )

          workflow_path.unlink()
          PY

      - name: Commit reordered sections
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add programs-center/index.html .github/workflows/reorder-programs-center-sections.yml
          git commit -m "Move partnership routes before impact section"
          git push origin main
