name: Hide mobile navigation and sticky CTA

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/hide-mobile-nav-and-cta.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply mobile-only cleanup and bump cache versions
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          css_path = Path('programs-center/compact-controls.css')
          app_path = Path('programs-center/app.js')
          index_path = Path('programs-center/index.html')
          workflow_path = Path('.github/workflows/hide-mobile-nav-and-cta.yml')

          css = css_path.read_text(encoding='utf-8')
          block = '''

/* Mobile: hide the dropdown navigation and sticky contact CTA */
@media (max-width: 760px) {
  body {
    padding-bottom: 0 !important;
  }

  .nav-toggle,
  .main-nav,
  .mobile-sticky-cta {
    display: none !important;
  }
}
'''
          if 'Mobile: hide the dropdown navigation and sticky contact CTA' not in css:
              css = css.rstrip() + block
              css_path.write_text(css, encoding='utf-8')

          app = app_path.read_text(encoding='utf-8')
          app, count = re.subn(r"compact-controls\.css\?v=\d+", "compact-controls.css?v=29", app, count=1)
          if count != 1:
              raise SystemExit('Could not update compact-controls.css version in app.js')
          app_path.write_text(app, encoding='utf-8')

          index = index_path.read_text(encoding='utf-8')
          index, css_count = re.subn(r'(compact-controls\.css\?v=)\d+', r'\g<1>29', index, count=1)
          index, app_count = re.subn(r'(<script src="\./app\.js\?v=)\d+("(?:></script>))', r'\g<1>34\g<2>', index, count=1)
          if css_count != 1 or app_count != 1:
              raise SystemExit('Could not update cache-busting versions in index.html')
          index_path.write_text(index, encoding='utf-8')

          workflow_path.unlink()
          PY

      - name: Commit completed correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add programs-center/compact-controls.css programs-center/app.js programs-center/index.html .github/workflows/hide-mobile-nav-and-cta.yml
          git commit -m "Hide mobile navigation and sticky CTA"
          git push origin main
