
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>חוברת פעילויות A4 | בחירת סדנאות</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #172033;
      --muted: #667085;
      --paper: #fffdf7;
      --line: rgba(23, 32, 51, 0.12);
      --blue: #203b7a;
      --cyan: #34c3d5;
      --pink: #d82f78;
      --purple: #6c4de6;
      --green: #1a9c74;
      --cream: #fff7e8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Assistant", "Heebo", "Rubik", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 5%, rgba(52,195,213,.18), transparent 32%),
        radial-gradient(circle at 92% 3%, rgba(216,47,120,.16), transparent 32%),
        linear-gradient(180deg, #f7fbff 0%, #eef3f9 55%, #f8f1e6 100%);
    }

    button,
    input { font: inherit; }

    .screen-controls {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto 24px;
      padding: 18px 0 0;
    }

    .control-hero {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 18px 20px;
      border-radius: 26px;
      background: rgba(255,255,255,.9);
      border: 1px solid rgba(255,255,255,.92);
      box-shadow: 0 18px 45px rgba(20,34,66,.12);
      backdrop-filter: blur(10px);
    }

    .control-hero h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.18;
      letter-spacing: -.03em;
    }

    .control-hero p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      font-weight: 700;
    }

    .print-btn,
    .action-btn {
      border: 1px solid rgba(23,32,51,.12);
      border-radius: 15px;
      padding: 11px 16px;
      cursor: pointer;
      font-weight: 900;
      color: #172033;
      background: white;
    }

    .print-btn {
      color: white;
      border-color: transparent;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      box-shadow: 0 12px 24px rgba(108,77,230,.22);
      white-space: nowrap;
    }

    .selector-panel {
      margin-top: 14px;
      padding: 16px;
      border-radius: 26px;
      background: rgba(255,255,255,.86);
      border: 1px solid rgba(255,255,255,.9);
      box-shadow: 0 14px 36px rgba(20,34,66,.09);
    }

    .selector-panel.collapsed .selector-body {
      display: none;
    }

    .selector-panel.collapsed .selector-top {
      margin-bottom: 0;
    }

    .header-subtitle {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .selector-top {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .selected-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 112px;
      min-height: 40px;
      padding: 8px 13px;
      border-radius: 999px;
      color: white;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      font-size: 13px;
      font-weight: 900;
    }

    .selector-body {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .filters-sidebar {
      flex: none;
      width: 200px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .filter-group {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
      padding: 10px 12px;
    }

    .filter-label {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 900;
      color: #344054;
    }

    .filter-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 8px;
    }

    .filter-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 2px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .filter-chip input {
      accent-color: var(--blue);
      width: 14px;
      height: 14px;
      flex: none;
      cursor: pointer;
    }

    .search-box {
      height: 46px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 15px;
      border-radius: 16px;
      background: white;
      border: 1px solid var(--line);
    }

    .search-box input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      font-size: 14px;
      font-weight: 700;
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-start;
    }

    .action-btn {
      min-height: 40px;
      padding: 8px 12px;
      font-size: 13px;
    }

    .activity-picker {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 380px;
      overflow: auto;
      padding: 2px 2px 4px;
    }

    .picker-section-label {
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      padding: 2px 0 0;
      letter-spacing: .03em;
    }

    .picker-grid {
      display: grid;
      gap: 7px;
    }

    .picker-grid.workshops {
      grid-template-columns: repeat(6, minmax(0, 1fr));
    }

    .picker-grid.escapes {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      max-width: 40%;
    }

    .activity-option {
      position: relative;
      display: block;
      cursor: pointer;
    }

    .activity-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .option-card {
      height: 100%;
      display: grid;
      grid-template-columns: 16px 1fr;
      gap: 7px;
      align-items: center;
      padding: 7px 10px;
      border-radius: 10px;
      background: white;
      border: 1px solid rgba(23,32,51,.11);
      transition: .16s ease;
    }

    .checkmark {
      width: 16px;
      height: 16px;
      border-radius: 5px;
      border: 2px solid rgba(23,32,51,.2);
      background: #fff;
      display: grid;
      place-items: center;
      font-size: 10px;
      font-weight: 900;
      color: white;
      flex-shrink: 0;
    }

    .activity-option.selected .option-card {
      border-color: color-mix(in srgb, var(--option-accent) 70%, white);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--option-accent) 10%, white), white 68%);
      box-shadow: 0 8px 18px rgba(20,34,66,.08);
    }

    .activity-option.selected .checkmark {
      border-color: transparent;
      background: var(--option-accent);
    }

    .activity-option.selected .checkmark::before { content: "✓"; }

    .option-title {
      display: block;
      font-size: 12px;
      line-height: 1.2;
      font-weight: 900;
      color: #172033;
    }

    .option-meta {
      display: block;
      margin-top: 2px;
      font-size: 10px;
      line-height: 1.3;
      font-weight: 700;
      color: var(--muted);
    }

    .booklet {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      padding: 0 0 60px;
    }

    .a4-page {
      width: 210mm;
      height: 297mm;
      position: relative;
      overflow: hidden;
      padding: 9mm 9mm 8mm;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto auto;
      row-gap: 2.4mm;
      background:
        radial-gradient(circle at 12% 7%, rgba(52,195,213,.15), transparent 29%),
        radial-gradient(circle at 92% 10%, rgba(216,47,120,.13), transparent 27%),
        linear-gradient(180deg, #fffdf8 0%, #ffffff 48%, #fff8eb 100%);
      border-radius: 5mm;
      box-shadow: 0 18px 55px rgba(20,34,66,.18);
      border: 1px solid rgba(23,32,51,.08);
    }

    .a4-page::before {
      content: "";
      position: absolute;
      inset: 4.5mm;
      border: 1px solid rgba(32,59,122,.16);
      border-radius: 4mm;
      pointer-events: none;
    }

    .page-header {
      position: relative;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: end;
      gap: 12px;
      height: 9mm;
      padding: 0 1mm 1mm;
      border-bottom: 1.4pt solid rgba(32,59,122,.88);
      margin-bottom: 1mm;
    }

    .page-header-logo {
      height: 8.5mm;
      width: auto;
      object-fit: contain;
      align-self: center;
    }

    .page-kicker {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 1.8mm;
      color: #203b7a;
      font-size: 10.5px;
      font-weight: 900;
    }

    .page-grade-label {
      margin: 0 0 .7mm;
      font-size: 9px;
      font-weight: 700;
      color: #9ca3af;
      letter-spacing: 0.03em;
      direction: rtl;
    }

    .page-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.05;
      letter-spacing: -.045em;
    }

    .stem-word {
      display: inline-flex;
      direction: ltr;
      gap: 0.3mm;
      vertical-align: baseline;
      font-weight: 950;
    }
    .stem-s { color: #1d4ed8; }
    .stem-t { color: #dc2626; }
    .stem-e { color: #facc15; }
    .stem-m { color: #16a34a; }

    .page-subtitle {
      margin: 1.8mm 0 0;
      color: var(--muted);
      font-size: 10.6px;
      line-height: 1.45;
      font-weight: 700;
      max-width: 138mm;
    }

    .page-badge {
      min-width: 29mm;
      text-align: center;
      padding: 2.5mm 3mm;
      border-radius: 99px;
      color: white;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      font-size: 10px;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(32,59,122,.18);
    }

    .page-grid {
      --grid-gap: 2.2mm;
      --horizontal-card-height: 52mm;
      --regular-card-row-height: calc((100% - var(--horizontal-card-height) - (2 * var(--grid-gap))) / 2);
      position: relative;
      z-index: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--grid-gap);
      align-content: stretch;
    }

    .page-grid.page-layout-top {
      grid-template-areas:
        "h h"
        "a b"
        "c d";
      grid-template-rows: var(--horizontal-card-height) var(--regular-card-row-height) var(--regular-card-row-height);
    }

    .page-grid.page-layout-middle {
      grid-template-areas:
        "a b"
        "h h"
        "c d";
      grid-template-rows: var(--regular-card-row-height) var(--horizontal-card-height) var(--regular-card-row-height);
    }

    .page-grid.page-layout-bottom {
      grid-template-areas:
        "a b"
        "c d"
        "h h";
      grid-template-rows: var(--regular-card-row-height) var(--regular-card-row-height) var(--horizontal-card-height);
    }

    .activity-card {
      --accent: #203b7a;
      position: relative;
      display: grid;
      overflow: hidden;
      background: rgba(255,255,255,.94);
      border: 1px solid rgba(23,32,51,.11);
      border-radius: 4mm;
      box-shadow: 0 9px 22px rgba(20,34,66,.09);
    }

    .activity-card::before {
      content: "";
      position: absolute;
      inset-inline-start: 0;
      top: 0;
      bottom: 0;
      width: 1.7mm;
      background: var(--accent);
    }

    .activity-card {
      grid-template-columns: 35% minmax(0, 1fr);
      grid-template-rows: auto auto;
      padding: 2.4mm 2.5mm 2.4mm 4mm;
      gap: 2mm;
      align-items: stretch;
      min-height: 0;
      break-inside: avoid;
      page-break-inside: avoid;
      direction: ltr;
      text-align: right;
    }

    .escape-room-card {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 40% minmax(0, 1fr);
      grid-template-rows: auto auto;
      gap: 3mm;
      align-items: stretch;
      direction: ltr;
      text-align: right;
    }

    .escape-room-card .media-column {
      grid-column: 1;
      grid-row: 1 / 3;
      margin-top: 0;
      align-self: center;
    }

    .escape-room-card .image-box {
      aspect-ratio: 1 / 1;
      height: auto;
      width: 100%;
      flex: none;
      margin-top: 0;
    }

    .escape-room-card .card-content {
      grid-column: 2;
      grid-row: 1;
    }

    .escape-room-card .goals-box {
      grid-column: 2;
      grid-row: 2;
    }

    .escape-room-card--mirrored {
      grid-template-columns: minmax(0, 1fr) 40%;
    }

    .escape-room-card--mirrored .media-column {
      grid-column: 2;
      grid-row: 1 / 3;
    }

    .escape-room-card--mirrored .card-content {
      grid-column: 1;
      grid-row: 1;
    }

    .escape-room-card--mirrored .goals-box {
      grid-column: 1;
      grid-row: 2;
    }


    .escape-room-page .page-title {
      font-size: 29px;
      line-height: 1.02;
      letter-spacing: -.04em;
    }

    .escape-room-page {
      padding-top: 7mm;
      padding-bottom: 6mm;
    }

    .escape-room-page .page-grid {
      display: flex;
      flex-direction: column;
      gap: 2.5mm;
      grid-template-columns: unset;
      grid-template-rows: unset;
      align-content: unset;
    }

    .escape-hero {
      position: relative;
      border: 1px solid rgba(32,59,122,.14);
      border-radius: 3.6mm;
      padding: 2.6mm 4.5mm;
      background: rgba(247, 252, 255, 0.95);
      direction: rtl;
      text-align: right;
    }

    .escape-hero::after {
      content: "";
      position: absolute;
      inset-inline: 5mm;
      bottom: 0;
      height: .8mm;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(30,58,138,.16), rgba(34,211,238,.18), rgba(30,58,138,.16));
    }

    .escape-hero-subtitle {
      margin: 0;
      font-size: 15px;
      color: #1e3a8a;
      font-weight: 800;
      line-height: 1.45;
    }

    .escape-intro-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3mm;
      flex: 0 0 auto;
    }

    .escape-info-card {
      background: linear-gradient(180deg, rgba(254,255,255,.96), rgba(246,251,255,.96));
      border: 1px solid rgba(148,163,184,.34);
      border-radius: 3.2mm;
      padding: 3.5mm 4mm;
      direction: rtl;
      text-align: right;
    }

    .escape-info-card-title {
      font-size: 11.5px;
      font-weight: 800;
      color: #203b7a;
      margin: 0 0 1.8mm;
      line-height: 1.3;
    }

    .escape-info-card-body {
      font-size: 10px;
      color: #374151;
      line-height: 1.65;
      font-weight: 400;
      margin: 0;
    }

    .duration-inline {
      font-size: 0.62em;
      font-weight: 500;
      color: #667085;
      margin-inline-start: 1.5mm;
      white-space: nowrap;
    }

    .escape-cards-row {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5mm;
      min-height: 0;
    }

    .escape-cards-row .activity-card {
      flex: 1;
      min-height: 0;
    }

    .escape-cards-row .escape-room-card {
      grid-column: auto;
    }

    .escape-cards-row .escape-room-card + .escape-room-card {
      margin-top: .8mm;
    }

    .escape-cards-row .escape-room-card {
      border-radius: 4.2mm;
      border: 1px solid rgba(100,116,139,.24);
      padding: 4.2mm 4.2mm 4.2mm 5.8mm;
      box-shadow: 0 10px 22px rgba(15,23,42,.08);
      page-break-inside: avoid;
      break-inside: avoid;
    }

    .escape-room-card .image-box {
      aspect-ratio: 1 / 1;
      min-height: 56mm;
    }

    .escape-room-card--bio {
      background: linear-gradient(145deg, rgba(254,255,250,.98), rgba(236,250,245,.96));
      border-color: rgba(22,163,74,.3);
      --accent: #0f766e;
    }

    .escape-room-card--astro {
      background: linear-gradient(145deg, rgba(252,254,255,.98), rgba(237,244,255,.96));
      border-color: rgba(99,102,241,.3);
      --accent: #1d4ed8;
    }

    .media-column {
      grid-column: 1;
      grid-row: 1;
      display: flex;
      flex-direction: column;
      gap: 1mm;
      align-items: stretch;
    }

    .image-box {
      height: 100%;
      min-height: 100%;
      border-radius: 3mm;
      overflow: hidden;
      background: #eef2f8;
      border: 1px solid rgba(23,32,51,.08);
      flex: none;
    }

    .image-box {
      width: 100%;
      aspect-ratio: 1 / 1;
      height: auto;
      min-height: 0;
      margin-top: 5mm;
    }

    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .image-placeholder {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 3mm;
      color: #8a99b4;
      font-size: 8px;
      text-align: center;
      font-weight: 800;
      background: linear-gradient(135deg, #eef2f8, #e4e9f4);
    }

    .card-content {
      grid-column: 2;
      grid-row: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1.2mm;
      direction: rtl;
      text-align: right;
    }

    .card-content { min-height: 13.5mm; }

    .card-header {
      display: flex;
      flex-direction: column;
      gap: 1.1mm;
    }

    .card-topline {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: center;
      gap: 0.5mm;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 4.5mm;
      padding: 0.6mm 1.3mm;
      border-radius: 999px;
      font-size: 8.3px;
      line-height: 1;
      font-weight: 900;
      color: #162033;
      background: rgba(255,255,255,.75);
      border: 1px solid rgba(23,32,51,.10);
    }

    .tag.accent {
      color: white;
      background: var(--accent);
      border-color: transparent;
    }

    .activity-card h2 {
      margin: 0 0 .8mm;
      letter-spacing: -.035em;
      color: var(--ink);
      padding-bottom: .9mm;
      border-bottom: 1px solid rgba(23, 32, 51, 0.18);
    }

    .activity-card h2 { font-size: 16.5px; line-height: 1.16; font-weight: 950; }

    .product-box {
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: .35mm;
      text-align: center;
      border-radius: 2.2mm;
      padding: 1.3mm 1.6mm;
      border: 1px solid color-mix(in srgb, var(--accent) 20%, rgba(23,32,51,.1));
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 9%, #f6f3ff), #f2f8ff 85%);
    }

    .product-line {
      margin: 0;
      font-size: 9px;
      line-height: 1.3;
      color: #24324a;
      font-weight: 700;
    }

    .product-name {
      font-weight: 950;
      color: #1f2a3d;
    }

    .card-description {
      margin: 0;
      min-height: 2.9em;
      color: #374151;
      font-weight: 500;
      font-size: 13px;
      line-height: 1.6;
    }

    .escape-room-card .card-description {
      font-size: 13.5px;
    }

    .escape-room-card .card-content {
      display: flex;
      flex-direction: column;
    }

    .escape-room-summary-line {
      grid-column: 1 / -1;
      grid-row: 3;
      margin: 0;
      padding-top: 3mm;
      border-top: 1px solid color-mix(in srgb, var(--accent) 20%, transparent);
      font-size: 1.15em;
      font-weight: 800;
      line-height: 1.35;
      color: var(--accent);
      direction: rtl;
      text-align: center;
    }

    .goals-box {
      grid-column: 1 / -1;
      grid-row: 2;
      padding-top: 1mm;
      border-top: 1px solid color-mix(in srgb, var(--accent) 14%, rgba(23,32,51,.08));
      direction: rtl;
      text-align: right;
    }

    .goals-title {
      margin: 0 0 .7mm;
      font-size: 16px;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: -.01em;
    }

    .goals-box ul {
      margin: 0;
      padding: 0 3.5mm 0 0;
    }

    .goals-box li {
      margin: .45mm 0;
      color: #374151;
      font-size: 13px;
      line-height: 1.45;
      font-weight: 400;
    }

    .activity-card.horizontal-card,
    .activity-card.side-card {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 1.4mm;
      padding: 2.2mm 2.8mm 2.2mm 4mm;
      direction: rtl;
      text-align: right;
      height: 52mm;
      min-height: 52mm;
      max-height: 52mm;
      overflow: hidden;
    }

    .horizontal-card .horizontal-title {
      display: flex;
      flex-direction: row-reverse;
      align-items: center;
      gap: 3mm;
      padding-bottom: .9mm;
    }

    .horizontal-card .horizontal-title h2 {

<body>
  <div class="back-bar" id="backBar">

        </div>

        </div>

          <div class="filter-group">

  <main id="booklet" class="booklet" aria-label="חוברת פעילויות A4"></main>

  <script>
    let activities = [];

    const booklet = document.getElementById("booklet");
    const picker = document.getElementById("activityPicker");

    const selectedCount = document.getElementById("selectedCount");
    const gradeFilters = document.getElementById("gradeFilters");
    const domainFilters = document.getElementById("domainFilters");
    const catalogModeBtn = document.getElementById("catalogModeBtn");
    const ACTIVITIES_PER_PAGE = 5;
    const PAGE_LAYOUT_SEQUENCE = ["bottom", "middle", "top", "middle", "bottom"];
    const LAYOUT_HORIZONTAL_INDEX = {
      top: 0,
      middle: 2,
      bottom: 4
    };
    const selected = new Set();

    const selectedGrades = new Set();
    const selectedDomains = new Set();

    const DOMAIN_COLORS = {
      "חלל":        "#1e3a8a",
      "אסטרונומיה": "#5b21b6",
      "אופטיקה":    "#0e7490",
      "תעופה":      "#1d4ed8",
      "ביומימיקרי": "#065f46",
      "קיימות":     "#047857",
      "כימיה":      "#c2410c",
      "ביולוגיה":   "#9d174d",
      "פיזיקה":     "#78350f",
      "הנדסה":      "#4338ca",
    };

    function normalizeActivity(rawActivity = {}, gradeGroup = "") {
      const title = rawActivity.workshopName ?? rawActivity.title ?? "";
      const domain = rawActivity.domain ?? "";
      const type = rawActivity.activityType ?? rawActivity.type ?? "סדנה";
      const durationMinutes = Number(rawActivity.durationMinutes);
      const duration = Number.isFinite(durationMinutes) && durationMinutes > 0
        ? `${durationMinutes} דקות`
        : (rawActivity.duration ?? "");
      const product = rawActivity.personalProduct ?? rawActivity.product ?? "";
      const text = rawActivity.description ?? rawActivity.text ?? "";
      const goals = Array.isArray(rawActivity.goals) ? rawActivity.goals.filter(Boolean) : [];
      const grades = Array.isArray(rawActivity.grades)
        ? rawActivity.grades.filter(Boolean)
        : (gradeGroup ? [gradeGroup] : []);
      const manualImage = rawActivity.image ?? rawActivity.imageUrl ?? rawActivity.imagePath ?? "";
      const paddedId = String(rawActivity.id ?? "").padStart(3, "0");
      const image = manualImage || (rawActivity.id ? `image/${paddedId}.png` : "");

      return {
        ...rawActivity,
        gradeGroup: rawActivity.gradeGroup ?? gradeGroup,
        title,
        domain,
        type,
        duration,
        product,
        text,
        goals,
        grades,
        image,
        accent: DOMAIN_COLORS[rawActivity.domain ?? ""] || rawActivity.accent || "#203b7a"
      };
    }

    async function loadActivities() {
      const response = await fetch("activities.json", { cache: "no-store" });
      if (!response.ok) throw new Error(`Failed to load activities.json (${response.status})`);
      const data = await response.json();

      if (Array.isArray(data?.gradeGroups)) {
        return data.gradeGroups.flatMap(group => {
          const groupGrade = group?.gradeGroup ?? "";
          const groupActivities = Array.isArray(group?.activities) ? group.activities : [];
          return groupActivities.map(activity => normalizeActivity(activity, groupGrade));
        });
      }

      if (Array.isArray(data?.activities)) {
        return data.activities.map(activity => normalizeActivity(activity));
      }

      return [];
    }

function chunkActivities(items, size) {
      const result = [];
      for (let i = 0; i < items.length; i += size) {
        result.push(items.slice(i, i + size));
      }
      return result;
    }

    function escapeHTML(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatGrade(grade) {
      return String(grade ?? "").replace(/[\u05D0-\u05EA]/g, "$&׳");
    }

    function imageMarkup(activity) {
      const isEscape = activity.type === "חדר בריחה";
      const productHTML = isEscape ? "" : `
          <div class="product-box">
            <p class="product-line">תוצר: <strong class="product-name">${escapeHTML(activity.product)}</strong></p>
          </div>`;
      return `
        <div class="media-column">
          <div class="image-box">
            <img src="${escapeHTML(activity.image)}" alt="${escapeHTML(activity.title)}" onerror="this.replaceWith(createImagePlaceholder())" />
          </div>
          ${productHTML}
          <div class="card-topline">
            <span class="tag">${escapeHTML(activity.domain)}</span>
          </div>
        </div>`;
    }

    function createImagePlaceholder() {
      const placeholder = document.createElement("div");
      placeholder.className = "image-placeholder";
      placeholder.textContent = "תמונה תתווסף כאן";
      return placeholder;
    }

    function renderCard(activity, isHorizontal = false) {
      const goals = activity.goals.map(goal => `<li>${escapeHTML(goal)}</li>`).join("");
      const card = document.createElement("article");
      const isEscape = activity.type === "חדר בריחה";
      card.className = isEscape ? "activity-card escape-room-card" : "activity-card";
      if (!isEscape && isHorizontal) card.classList.add("horizontal-card");
      card.style.setProperty("--accent", activity.accent || "#203b7a");

      if (isEscape) {
        const summaryHTML = activity.summaryLine
          ? `<p class="escape-room-summary-line">${escapeHTML(activity.summaryLine)}</p>`
          : "";
        card.innerHTML = `
        ${imageMarkup(activity)}
        <div class="card-content">
          <div class="card-header">
            <h2>${escapeHTML(activity.title)}</h2>
          </div>
          <p class="card-description">${escapeHTML(activity.text)}</p>
        </div>
        ${summaryHTML}`;
        return card;
      }

      if (isHorizontal) {
        card.innerHTML = `
        <div class="horizontal-title">
          <h2>${escapeHTML(activity.title)}</h2>
          <div class="card-topline">
            <span class="tag">${escapeHTML(activity.domain)}</span>
          </div>
        </div>
        <div class="horizontal-body">
          <div class="horizontal-media">
            <div class="image-box">
              <img src="${escapeHTML(activity.image)}" alt="${escapeHTML(activity.title)}" onerror="this.replaceWith(createImagePlaceholder())" />
            </div>
            <div class="product-box">
              <p class="product-line">תוצר: <strong class="product-name">${escapeHTML(activity.product)}</strong></p>
            </div>
          </div>
          <div class="horizontal-text">
            <p class="card-description">${escapeHTML(activity.text)}</p>
            <div class="goals-box">
              <p class="goals-title">מטרות מרכזיות</p>
              <ul>${goals}</ul>
            </div>
          </div>
        </div>`;
        return card;
      }

      card.innerHTML = `
        ${imageMarkup(activity)}
        <div class="card-content">
          <div class="card-header">
            <h2>${escapeHTML(activity.title)}</h2>
          </div>
          <p class="card-description">${escapeHTML(activity.text)}</p>
        </div>
        <div class="goals-box">
          <p class="goals-title">מטרות מרכזיות</p>
          <ul>${goals}</ul>
        </div>`;
      return card;
    }

    function renderEscapeRoomPage(escapeActivities, pageIndex, totalPages) {
      const page = document.createElement("section");
      page.className = "a4-page catalog-page escape-room-page";
      page.setAttribute("aria-label", `עמוד ${pageIndex + 1} מתוך ${totalPages}`);

      page.innerHTML = `
        <header class="page-header">
          <img class="page-header-logo" src="logo.png" alt="לוגו" />
          <div><h1 class="page-title">חדרי בריחה דיגיטליים</h1></div>
        </header>
        <div class="page-grid">
          <div class="escape-hero">
            <p class="escape-hero-subtitle">מסע דיגיטלי של חידות, אתגרים וגילוי — בדרך ללמידה פעילה ומשמעותית.</p>
          </div>
          <div class="escape-intro-cards">
            <div class="escape-info-card">
              <p class="escape-info-card-title">חוויית למידה אחרת</p>
              <p class="escape-info-card-body">חדרי הבריחה של תעשיידע מזמינים את התלמידים למסע אינטראקטיבי שבו סיפור, חידות, מדע וטכנולוגיה מתחברים לעולם מסקרן ומלא גילוי. מהרגע הראשון התלמידים נכנסים למשימה שמעוררת שאלה ומזמינה לגלות מה מסתתר מאחורי הדלת הבאה.</p>
            </div>
            <div class="escape-info-card">
              <p class="escape-info-card-title">לומדים דרך משימה</p>
              <p class="escape-info-card-body">במקום לפגוש את הידע רק דרך הסבר, המשתתפים נכנסים לתוך סיפור דיגיטלי חי. הם מפענחים רמזים, פותרים אתגרים, מקבלים החלטות, עובדים יחד ומגלים בהדרגה את הידע שמסתתר מאחורי העלילה. כל פתרון חושף פרט נוסף ומקדם את הקבוצה להמשך הדרך.</p>
            </div>
            <div class="escape-info-card">
              <p class="escape-info-card-title">חשיבה, שיתוף פעולה וגילוי</p>
              <p class="escape-info-card-body">לאורך הפעילות התלמידים מתבוננים בפרטים, שואלים שאלות ומחברים בין מידע ורעיונות. הם נדרשים להקשיב זה לזה, לחלק תפקידים ולתרגל עבודת צוות בדרך לפתרון משותף. כל חדר בריחה נבנה סביב עולם תוכן ייחודי ומאפשר למידה דרך אתגר, סיפור וגילוי.</p>
            </div>
          </div>
          <div class="escape-cards-row"></div>
        </div>
        <div class="page-contact">לפרטים נוספים: יעל אביב &nbsp;–&nbsp; 054-7790073 &nbsp;|&nbsp; <a href="mailto:yael_aviv@think.org.il" style="color:inherit;text-decoration:none;">yael_aviv@think.org.il</a></div>
        <footer class="page-footer">
          <span class="page-footer-org">© כל הזכויות שמורות לתעשיידע – תעשייה למען חינוך מתקדם ע״ר</span>
          <span class="page-number">${pageIndex + 1}</span>
        </footer>`;

      const cardsRow = page.querySelector(".escape-cards-row");
      if (escapeActivities.length === 1) cardsRow.classList.add("escape-cards-row--single");
      escapeActivities.forEach((activity, i) => {
        const card = renderCard(activity);
        const title = activity.title || "";
        if (title.includes("ביומימיקרי")) card.classList.add("escape-room-card--bio");
        if (title.includes("אסטרואיד")) card.classList.add("escape-room-card--astro");
        if (i === 0) card.classList.add("escape-room-card--mirrored");
        cardsRow.appendChild(card);
      });
      return page;
    }

    function formatGradeGroup(g) {
      return ({ "א-ג": "כיתות א׳–ג׳", "ד-ו": "כיתות ד׳–ו׳", "א-ו": "כיתות א׳–ו׳" })[g] || g;
    }

    function renderPage(items, pageIndex, totalPages, isEscapePage = false, gradeLabel = "", layoutIndex = pageIndex) {
      const page = document.createElement("section");
      page.className = "a4-page catalog-page";
      page.setAttribute("aria-label", `עמוד ${pageIndex + 1} מתוך ${totalPages}`);
      const stemHTML = `<span class="stem-word" dir="ltr"><span class="stem-s">S</span><span class="stem-t">T</span><span class="stem-e">E</span><span class="stem-m">M</span></span>`;
      const durationLabel = items?.[0]?.duration || "";
      const pageTitleHTML = isEscapePage
        ? "חדרי בריחה"
        : `סדנאות ${stemHTML} חווייתיות${gradeLabel ? ` | ${escapeHTML(gradeLabel)}` : ""}${durationLabel ? ` <span class="duration-inline">(${escapeHTML(durationLabel)})</span>` : ""}`;

      page.innerHTML = `
        <header class="page-header">
          <img class="page-header-logo" src="logo.png" alt="לוגו" />
          <div>
            <h1 class="page-title">${pageTitleHTML}</h1>
          </div>
        </header>
        <div class="page-grid"></div>
        <div class="page-contact">לפרטים נוספים: יעל אביב &nbsp;–&nbsp; 054-7790073 &nbsp;|&nbsp; <a href="mailto:yael_aviv@think.org.il" style="color:inherit;text-decoration:none;">yael_aviv@think.org.il</a></div>
        <footer class="page-footer">

          <span class="page-footer-org">© כל הזכויות שמורות לתעשיידע – תעשייה למען חינוך מתקדם ע״ר</span>
          <span class="page-number">${pageIndex + 1}</span>
        </footer>`;

      const grid = page.querySelector(".page-grid");
      const layoutKey = PAGE_LAYOUT_SEQUENCE[layoutIndex % PAGE_LAYOUT_SEQUENCE.length];
      grid.classList.add(`page-layout-${layoutKey}`);
      const horizontalIndex = LAYOUT_HORIZONTAL_INDEX[layoutKey];
      const areaNames = ["a", "b", "c", "d"];
      let gridIndex = 0;

      items.forEach((activity, index) => {
        const isHorizontal = index === horizontalIndex;
        const card = renderCard(activity, isHorizontal);
        if (isHorizontal) {
          card.style.gridArea = "h";
        } else if (gridIndex < areaNames.length) {
          card.style.gridArea = areaNames[gridIndex++];
        }
        grid.appendChild(card);
      });
      return page;
    }



    function mixActivitiesByDomain(items) {
      const buckets = new Map();
      items.forEach(activity => {
        const key = (activity.domain || "ללא תחום").trim();
        if (!buckets.has(key)) buckets.set(key, []);
        buckets.get(key).push(activity);
      });

      const domains = [...buckets.keys()].sort((a, b) => a.localeCompare(b, "he"));
      const mixed = [];

      while (domains.some(domain => buckets.get(domain).length > 0)) {
        let pickedInRound = false;
        domains.forEach(domain => {
          const bucket = buckets.get(domain);
          if (!bucket.length) return;
          mixed.push(bucket.shift());
          pickedInRound = true;
        });
        if (!pickedInRound) break;
      }

      return mixed;
    }

    function getSelectedActivities() {
      return activities
        .map((activity, index) => ({ ...activity, originalIndex: index }))
        .filter(activity => selected.has(activity.originalIndex) && matchesAdvancedFilters(activity));
    }

    function renderCatalog(filteredActivities) {
      selectedCount.textContent = `${filteredActivities.length} נבחרו`;
      booklet.innerHTML = "";

      if (!filteredActivities.length) {
        booklet.innerHTML = `<section class="empty-booklet"><strong>לא נבחרו פעילויות</strong>בחר לפחות פעילות אחת כדי לבנות את קטלוג ה־A4.</section>`;
        return;
      }

      const gradeGroupsOrder = ["א-ג", "ד-ו"];
      const workshopActivities = filteredActivities.filter(activity => activity.type !== "חדר בריחה");
      const escapeRoomActivities = filteredActivities.filter(activity => activity.type === "חדר בריחה");
      const hasEscape = escapeRoomActivities.length > 0;

      const allGroupPages = gradeGroupsOrder
        .map(group => ({
          group,
          label: formatGradeGroup(group),
          pages: chunkActivities(mixActivitiesByDomain(workshopActivities.filter(a => a.gradeGroup === group)), ACTIVITIES_PER_PAGE)
        }))
        .filter(g => g.pages.length > 0);

      const totalWorkshopPages = allGroupPages.reduce((sum, g) => sum + g.pages.length, 0);
      const totalPages = totalWorkshopPages + (hasEscape ? 1 : 0);

      let globalPageIndex = 0;
      allGroupPages.forEach(({ label, pages }) => {
        pages.forEach((items, localIndex) => {
          booklet.appendChild(renderPage(items, globalPageIndex, totalPages, false, label, localIndex));
          globalPageIndex++;
        });
      });

      if (hasEscape) {
        booklet.appendChild(renderEscapeRoomPage(escapeRoomActivities, globalPageIndex, totalPages));
      }
    }

    

    function uniqueValues(extractor) {
      return [...new Set(activities.flatMap(extractor))];
    }

    function renderFilterChips(container, values, key) {
      container.innerHTML = "";
      values.forEach(value => {
        const isChecked = key === "grade" ? selectedGrades.has(value) : selectedDomains.has(value);
        const label = document.createElement("label");
        label.className = "filter-chip";
        const displayValue = key === "grade" ? formatGrade(value) : value;
        label.innerHTML = `<input type="checkbox" data-filter-key="${key}" data-filter-value="${escapeHTML(value)}" ${isChecked ? "checked" : ""} />${escapeHTML(displayValue)}`;
        container.appendChild(label);
      });
    }

    function renderFilters() {
      renderFilterChips(gradeFilters, uniqueValues(activity => activity.grades), "grade");
      renderFilterChips(domainFilters, uniqueValues(activity => [activity.domain]), "domain");
    }


    function matchesAdvancedFilters(activity) {
      const gradeMatch = !selectedGrades.size || activity.grades.some(grade => selectedGrades.has(grade));
      const domainMatch = !selectedDomains.size || selectedDomains.has(activity.domain);
      return gradeMatch && domainMatch;
    }

    function renderPicker() {
      picker.innerHTML = "";

      const workshopGrid = document.createElement("div");
      workshopGrid.className = "picker-grid workshops";
      const escapeGrid = document.createElement("div");
      escapeGrid.className = "picker-grid escapes";

      activities.forEach((activity, index) => {
        if (!matchesAdvancedFilters(activity)) return;
        const label = document.createElement("label");
        label.className = "activity-option" + (selected.has(index) ? " selected" : "");
        label.style.setProperty("--option-accent", activity.accent || "#203b7a");
        label.innerHTML = `
          <input type="checkbox" data-index="${index}" ${selected.has(index) ? "checked" : ""} />
          <span class="option-card">
            <span class="checkmark" aria-hidden="true"></span>
            <span>
              <span class="option-title">${escapeHTML(activity.title)}</span>
              <span class="option-meta">${escapeHTML(activity.type)} · ${escapeHTML(activity.domain)} · ${escapeHTML(activity.grades.map(formatGrade).join(", "))}</span>
            </span>
          </span>`;
        if (activity.type === "חדר בריחה") {
          escapeGrid.appendChild(label);
        } else {
          workshopGrid.appendChild(label);
        }
      });

      if (workshopGrid.children.length) {
        const lbl = document.createElement("p");
        lbl.className = "picker-section-label";
        lbl.textContent = "סדנאות";
        picker.appendChild(lbl);
        picker.appendChild(workshopGrid);
      }
      if (escapeGrid.children.length) {
        const lbl = document.createElement("p");
        lbl.className = "picker-section-label";
        lbl.textContent = "חדרי בריחה";
        picker.appendChild(lbl);
        picker.appendChild(escapeGrid);
      }
    }

    function renderAll() {
      renderFilters();
      renderPicker();
      renderCatalog(getSelectedActivities());
    }

    picker.addEventListener("change", event => {
      const checkbox = event.target.closest('input[type="checkbox"][data-index]');
      if (!checkbox) return;
      const index = Number(checkbox.dataset.index);
      checkbox.checked ? selected.add(index) : selected.delete(index);
      renderAll();
    });

    document.addEventListener("change", event => {
      const filterInput = event.target.closest("input[data-filter-key]");
      if (!filterInput) return;
      const { filterKey, filterValue } = filterInput.dataset;
      const bucket = filterKey === "grade" ? selectedGrades : selectedDomains;

      if (filterInput.checked) {
        bucket.add(filterValue);
        activities.forEach((activity, index) => {
          const matches = filterKey === "grade"
            ? activity.grades.includes(filterValue)
            : activity.domain === filterValue;
          if (matches) selected.add(index);
        });
      } else {
        bucket.delete(filterValue);
        activities.forEach((activity, index) => {
          const matches = filterKey === "grade"
            ? activity.grades.includes(filterValue)
            : activity.domain === filterValue;
          if (!matches) return;
          const coveredByGrade = activity.grades.some(g => selectedGrades.has(g));
          const coveredByDomain = selectedDomains.has(activity.domain);
          if (!coveredByGrade && !coveredByDomain) selected.delete(index);
        });
      }
      renderAll();
    });

    catalogModeBtn.addEventListener("click", () => {
      document.body.classList.toggle("catalog-mode");
    });

    document.getElementById("backBtn").addEventListener("click", () => {
      document.body.classList.remove("catalog-mode");
    });

    const selectorPanel = document.getElementById("selectorPanel");
    const togglePickerBtn = document.getElementById("togglePickerBtn");
    togglePickerBtn.addEventListener("click", () => {
      const isCollapsed = selectorPanel.classList.toggle("collapsed");
      togglePickerBtn.textContent = isCollapsed ? "▾ בחר פעילויות" : "▴ סגור";
    });


    document.addEventListener("click", event => {
      const actionButton = event.target.closest("[data-action]");
      if (!actionButton) return;
      const action = actionButton.dataset.action;
      selected.clear();
      selectedGrades.clear();
      selectedDomains.clear();

      if (action === "all") {
        activities.forEach((_, index) => selected.add(index));
        uniqueValues(a => a.grades).forEach(g => selectedGrades.add(g));
        uniqueValues(a => [a.domain]).forEach(d => selectedDomains.add(d));
      } else if (action === "workshops") {
        activities.forEach((activity, index) => { if (activity.type === "סדנה") selected.add(index); });
      } else if (action === "escapes") {
        activities.forEach((activity, index) => { if (activity.type === "חדר בריחה") selected.add(index); });
      }

      renderAll();
    });

    async function init() {
      try {
        activities = await loadActivities();
        renderAll();
      } catch (error) {
        console.error(error);
        selectedCount.textContent = "0 נבחרו";
        picker.innerHTML = "";
        booklet.innerHTML = `<section class="empty-booklet"><strong>שגיאה בטעינת פעילויות</strong>לא ניתן היה לטעון את activities.json.</section>`;
      }
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js");
      });
    }

    init();
  </script>
