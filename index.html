<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>קטלוג סדנאות תעשיידע</title>

  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #d9deea;
      --primary: #2f4fdf;
      --primary-soft: #eef2ff;
      --radius: 14px;
      --shadow: 0 8px 24px rgba(16, 24, 40, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans Hebrew", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 20px 0 40px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px 16px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 54px;
      height: 54px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .subtitle {
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
    }

    .summary {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    label {
      font-size: 12px;
      color: var(--muted);
    }

    select,
    input,
    button {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0 10px;
      font-size: 13px;
      background: #fff;
      color: var(--text);
    }

    button {
      cursor: pointer;
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      font-weight: 700;
    }

    button.secondary {
      background: #fff;
      color: var(--text);
      border-color: var(--line);
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: end;
    }

    .list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .activity-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
      min-height: 220px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .activity-title {
      font-size: 18px;
      line-height: 1.2;
      font-weight: 800;
      margin: 0;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .product {
      font-size: 13px;
      line-height: 1.45;
      background: #f8f9fd;
      border-radius: 10px;
      padding: 8px 10px;
    }

    .description {
      font-size: 13.5px;
      line-height: 1.55;
      margin: 0;
    }

    .goals {
      margin: 0;
      padding-right: 18px;
      font-size: 13px;
      line-height: 1.45;
    }

    .empty {
      background: var(--card);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      color: var(--muted);
      grid-column: 1 / -1;
    }

    .print-panel {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 900px) {
      .toolbar {
        grid-template-columns: repeat(2, 1fr);
      }

      .list {
        grid-template-columns: repeat(2, 1fr);
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .summary {
        white-space: normal;
      }
    }

    @media (max-width: 620px) {
      .toolbar,
      .list {
        grid-template-columns: 1fr;
      }
    }

    @media print {
      body {
        background: white;
      }

      .page {
        width: 100%;
        padding: 0;
      }

      .toolbar,
      .print-panel {
        display: none;
      }

      header,
      .activity-card {
        box-shadow: none;
      }

      .list {
        grid-template-columns: 1fr;
        gap: 8mm;
      }

      .activity-card {
        break-inside: avoid;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header>
      <div class="brand">
        <img class="logo" src="logo.png" alt="לוגו תעשיידע" />
        <div>
          <h1>קטלוג סדנאות ופעילויות</h1>
          <div class="subtitle">בחירה לפי שכבת גיל, תחום, סדנאות וחדרי בריחה</div>
        </div>
      </div>
      <div class="summary" id="summaryText">טוען נתונים...</div>
    </header>

    <section class="toolbar" aria-label="סינון פעילויות">
      <div class="field">
        <label for="gradeFilter">שכבת גיל</label>
        <select id="gradeFilter">
          <option value="">הכול</option>
        </select>
      </div>

      <div class="field">
        <label for="domainFilter">תחום</label>
        <select id="domainFilter">
          <option value="">הכול</option>
        </select>
      </div>

      <div class="field">
        <label for="typeFilter">סוג פעילות</label>
        <select id="typeFilter">
          <option value="">הכול</option>
          <option value="סדנה">סדנאות</option>
          <option value="חדר בריחה">חדרי בריחה</option>
        </select>
      </div>

      <div class="field">
        <label for="countFilter">כמות להצגה</label>
        <select id="countFilter">
          <option value="1">סדנה בודדת</option>
          <option value="3">3 פעילויות</option>
          <option value="6">6 פעילויות</option>
          <option value="all" selected>הכול</option>
        </select>
      </div>

      <div class="actions">
        <button type="button" id="resetBtn" class="secondary">איפוס</button>
        <button type="button" onclick="window.print()">הדפסה</button>
      </div>
    </section>

    <section class="toolbar" aria-label="חיפוש">
      <div class="field" style="grid-column: 1 / -1;">
        <label for="searchInput">חיפוש לפי שם, תחום, תוצר או תיאור</label>
        <input id="searchInput" type="search" placeholder="לדוגמה: חלל, מגנטים, טלסקופ..." />
      </div>
    </section>

    <section class="list" id="activitiesList"></section>

    <div class="print-panel">
      <span>הקובץ מיועד להעלאה לריפו לצד הקבצים: <strong>activities_complete_full_he.json</strong> ו־<strong>logo.png</strong></span>
      <span id="selectedCount"></span>
    </div>
  </main>

  <script>
    const DATA_FILE = "activities_complete_full_he.json";

    const state = {
      activities: [],
      filtered: []
    };

    const els = {
      grade: document.getElementById("gradeFilter"),
      domain: document.getElementById("domainFilter"),
      type: document.getElementById("typeFilter"),
      count: document.getElementById("countFilter"),
      search: document.getElementById("searchInput"),
      list: document.getElementById("activitiesList"),
      summary: document.getElementById("summaryText"),
      selectedCount: document.getElementById("selectedCount"),
      reset: document.getElementById("resetBtn")
    };

    function normalizeText(value) {
      return String(value || "").trim();
    }

    function getActivityValue(activity, keys) {
      for (const key of keys) {
        if (activity[key] !== undefined && activity[key] !== null && String(activity[key]).trim() !== "") {
          return activity[key];
        }
      }
      return "";
    }

    function flattenActivities(data) {
      if (Array.isArray(data)) return data;

      if (Array.isArray(data.activities)) return data.activities;
      if (Array.isArray(data["פעילויות"])) return data["פעילויות"];
      if (Array.isArray(data.items)) return data.items;

      const groups = data.groups || data["קבוצות"] || data.byGrade || data["לפי_כיתה"] || data["חלוקה_לפי_קבוצות_גיל"];
      if (Array.isArray(groups)) {
        return groups.flatMap(group => {
          const groupItems = group.activities || group["פעילויות"] || group.items || [];
          return groupItems.map(item => ({
            ...item,
            groupTitle: item.groupTitle || group.title || group["כותרת"] || group.name || group["שם"]
          }));
        });
      }

      return [];
    }

    function mapActivity(raw, index) {
      const title = getActivityValue(raw, ["שם סדנה", "שם_סדנה", "name", "title", "שם"]);
      const domain = getActivityValue(raw, ["תחום", "domain"]);
      const grade = getActivityValue(raw, ["כיתה", "שכבת גיל", "שכבת_גיל", "grade", "ageGroup", "groupTitle"]);
      const type = getActivityValue(raw, ["סוג פעילות", "סוג_פעילות", "type"]) || (domain.includes("חדר") ? "חדר בריחה" : "סדנה");
      const duration = getActivityValue(raw, ["משך הפעילות", "משך_הפעילות", "duration"]);
      const product = getActivityValue(raw, ["תוצר אישי", "תוצר_אישי", "תוצר", "product"]);
      const description = getActivityValue(raw, ["תיאור הסדנה", "תיאור_הסדנה", "description", "תיאור"]);
      const goals = getActivityValue(raw, ["מטרות", "goals"]) || [];

      return {
        id: raw.id || index + 1,
        title,
        domain,
        grade,
        type,
        duration,
        product,
        description,
        goals: Array.isArray(goals) ? goals : String(goals).split(/\n|•|-/).map(x => x.trim()).filter(Boolean),
        raw
      };
    }

    function uniqueValues(items, key) {
      return [...new Set(items.map(item => normalizeText(item[key])).filter(Boolean))].sort((a, b) => a.localeCompare(b, "he"));
    }

    function fillSelect(select, values) {
      const first = select.querySelector("option");
      select.innerHTML = "";
      select.appendChild(first);
      values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function renderCard(activity) {
      const goalsHtml = activity.goals.slice(0, 3).map(goal => `<li>${escapeHtml(goal)}</li>`).join("");

      return `
        <article class="activity-card">
          <div class="card-top">
            <h2 class="activity-title">${escapeHtml(activity.title)}</h2>
            <span class="tag">${escapeHtml(activity.domain)}</span>
          </div>

          <div class="meta">
            <span>${escapeHtml(activity.grade)}</span>
            <span>•</span>
            <span>${escapeHtml(activity.type)}</span>
            ${activity.duration ? `<span>•</span><span>${escapeHtml(activity.duration)}</span>` : ""}
          </div>

          <div class="product"><strong>תוצר אישי:</strong> ${escapeHtml(activity.product)}</div>

          <p class="description">${escapeHtml(activity.description)}</p>

          <ol class="goals">${goalsHtml}</ol>
        </article>
      `;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function applyFilters() {
      const grade = els.grade.value;
      const domain = els.domain.value;
      const type = els.type.value;
      const query = normalizeText(els.search.value).toLowerCase();

      let results = state.activities.filter(activity => {
        const text = [
          activity.title,
          activity.domain,
          activity.grade,
          activity.type,
          activity.product,
          activity.description,
          activity.goals.join(" ")
        ].join(" ").toLowerCase();

        return (!grade || activity.grade === grade)
          && (!domain || activity.domain === domain)
          && (!type || activity.type === type)
          && (!query || text.includes(query));
      });

      const count = els.count.value;
      if (count !== "all") {
        results = results.slice(0, Number(count));
      }

      state.filtered = results;
      render();
    }

    function render() {
      if (!state.filtered.length) {
        els.list.innerHTML = `<div class="empty">לא נמצאו פעילויות לפי הסינון הנוכחי.</div>`;
      } else {
        els.list.innerHTML = state.filtered.map(renderCard).join("");
      }

      els.summary.textContent = `${state.filtered.length} מתוך ${state.activities.length} פעילויות מוצגות`;
      els.selectedCount.textContent = `נבחרו להצגה: ${state.filtered.length}`;
    }

    function resetFilters() {
      els.grade.value = "";
      els.domain.value = "";
      els.type.value = "";
      els.count.value = "all";
      els.search.value = "";
      applyFilters();
    }

    async function init() {
      try {
        const response = await fetch(DATA_FILE);
        if (!response.ok) throw new Error("JSON file was not found");
        const data = await response.json();

        state.activities = flattenActivities(data).map(mapActivity).filter(activity => activity.title);
        fillSelect(els.grade, uniqueValues(state.activities, "grade"));
        fillSelect(els.domain, uniqueValues(state.activities, "domain"));

        applyFilters();
      } catch (error) {
        els.summary.textContent = "לא ניתן לטעון את קובץ הנתונים";
        els.list.innerHTML = `
          <div class="empty">
            לא נמצא הקובץ <strong>${DATA_FILE}</strong> באותה תיקייה.<br>
            יש להעלות לריפו את הקבצים: <strong>index.html</strong>, <strong>${DATA_FILE}</strong>, <strong>logo.png</strong>.
          </div>
        `;
      }
    }

    [els.grade, els.domain, els.type, els.count, els.search].forEach(el => {
      el.addEventListener("input", applyFilters);
      el.addEventListener("change", applyFilters);
    });

    els.reset.addEventListener("click", resetFilters);

    init();
  </script>
</body>
</html>
