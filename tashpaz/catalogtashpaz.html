<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<title>קטלוג תוכניות – תעשיידע</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; direction: rtl; background: #D8DFE6; color: #1E2D3D; }

.nav { display: flex; gap: 6px; flex-wrap: wrap; padding: 11px 18px 9px; border-bottom: 1px solid #C8D2DA; background: #EEF1F4; position: sticky; top: 0; z-index: 10; }

.nav-btn.active, .nav-btn:hover { background: var(--c3); border-color: var(--c1); color: var(--c0); }

.page-wrap { padding: 28px 20px; display: flex; flex-direction: column; align-items: center; }

.a4 {

.a4-banner-date {

}
.a4-flow { font-size: 11.5px; color: #1E2D3D; line-height: 1.65; padding: 8px 11px; }

.a4-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }

.a4-block-label {

.a4-block-content { font-size: 11.5px; color: #1E2D3D; line-height: 1.55; padding: 7px 11px; }

  color: #fff; background: var(--c1);
  padding: 4px 11px;
}

.syllabus-table th { background: var(--c2); color: #fff; font-size: 9.5px; padding: 3px 8px; font-weight: bold; text-align: center; }
.syllabus-table th:last-child { text-align: right; }
.syllabus-table th:first-child { text-align: center; width: 36px; }
.syllabus-table td { padding: 3px 8px; border-bottom: 1px solid var(--c3); vertical-align: top; line-height: 1.4; }

.syl-num { color: var(--c0); font-weight: bold; width: 36px; text-align: center; }
.syl-topic { font-weight: bold; color: #1E2D3D; width: 120px; text-align: right; }
.syl-desc { color: #444; text-align: right; }

.a4-footer {
  margin-top: auto; padding: 9px 18mm;
  background: var(--c3);
  display: flex; justify-content: space-between; align-items: center;

.a4-footer-brand { font-size: 11px; color: var(--c0); font-weight: bold; }
.a4-footer-gefen { font-size: 10px; color: var(--c2); }

.print-btn { margin-top: 16px; }
.print-btn button { font-size: 14px; padding: 10px 28px; border: none; border-radius: 8px; background: #3A5068; color: #fff; cursor: pointer; font-family: Arial, sans-serif; font-weight: bold; }
.print-btn button:hover { opacity: 0.85; }

@media print {
  @page {
    size: A4;
    margin: 0;
  }

  .nav, .print-btn { display: none !important; }
  html, body { width: 210mm; margin: 0; padding: 0; background: #fff; }
  .page-wrap { padding: 0; }
  .a4 { width: 210mm; max-width: 210mm; box-shadow: none; border-radius: 0; page-break-after: always; min-height: 0; }
  .a4-banner { width: 100%; margin: 0; border-radius: 0; }
}

@page {
  size: A4;
  margin: 0;
}

</style>

function buildNav() {
  const nav = document.getElementById("nav");
  programs.forEach((p,i) => {
    const btn = document.createElement("button");
    btn.className = "nav-btn"+(i===0?" active":"");
    btn.style.setProperty('--c0',p.c0);
    btn.style.setProperty('--c1',p.c1);
    btn.style.setProperty('--c3',p.c3);
    btn.textContent = p.title;
    btn.onclick = () => { render(i); document.querySelectorAll(".nav-btn").forEach((b,j)=>b.classList.toggle("active",j===i)); };
    nav.appendChild(btn);
  });
}

function buildSyllabus(p) {
  const rows = syllabus[p.gefen]||[];
  if (!rows.length) return '';
  return `<div class="syllabus-wrap">
    <div class="syllabus-header">סילבוס – מפגשים</div>
    <table class="syllabus-table">
      <thead><tr><th>מפגש</th><th style="text-align:right">נושא</th><th style="text-align:right">תיאור</th></tr></thead>
      <tbody>${rows.map(r=>`<tr>
        <td class="syl-num">${r.n}</td>
        <td class="syl-topic">${r.topic}</td>
        <td class="syl-desc">${r.desc}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
}

function render(i) {
  const p = programs[i];
  const skills = p.develops.split(",").map(s=>`<span class="pill">${s.trim()}</span>`).join("");
  const style = `--c0:${p.c0};--c1:${p.c1};--c2:${p.c2};--c3:${p.c3};--c4:${p.c4};--c5:${p.c5};--c6:${p.c6}`;
  const dateStr = new Date().toLocaleDateString("he-IL", { day: "numeric", month: "long", year: "numeric" });
  document.getElementById("a4-container").innerHTML = `
    <div class="a4" style="${style}">
      <div class="a4-banner">
        <div class="a4-banner-text">
          <div class="a4-gefen">גפן ${p.gefen}</div>
          <h1 class="a4-title">${p.title}</h1>
          <p class="a4-subtitle">${p.subtitle}</p>
          <div class="a4-badges"><span class="badge">${p.grades}</span><span class="badge">${p.sessions}</span><span class="badge">${p.duration}</span></div>
          <span class="a4-banner-date">${dateStr}</span>
        </div>
        <div class="a4-banner-left">
          <img class="a4-logo" src="${LOGO}" alt="לוגו תעשיידע">
        </div>
      </div>
      <div class="a4-body">
        <p class="a4-opening">${p.opening}</p>
        <div class="a4-full"><div class="a4-section-title">רעיון מרכזי</div><div class="a4-flow">${p.core}</div></div>
        <div class="a4-full"><div class="a4-section-title">תיאור התוכנית</div><div class="a4-flow">${p.short}</div></div>
        <div class="a4-full"><div class="a4-section-title">תהליך הלמידה והמטרות</div><div class="a4-flow">${p.goals}</div></div>
        <div class="a4-grid">
          <div class="a4-block"><div class="a4-block-label">מה התלמיד עושה</div><div class="a4-block-content">${p.flow}</div></div>
          <div class="a4-block"><div class="a4-block-label">ערך לבית הספר</div><div class="a4-block-content">${p.school}</div></div>
        </div>
        <div class="a4-full"><div class="a4-section-title">מיומנויות שמפתחים</div><div class="pill-row">${skills}</div></div>
        <div class="a4-outcome-box"><div class="a4-outcome-label">תוצר סיום</div><div class="a4-outcome-content">${p.outcome}</div></div>
        ${buildSyllabus(p)}
      </div>
      <div class="a4-footer">
        <span class="a4-footer-brand">תעשיידע | taasiyeda.org.il</span>
        <span class="a4-footer-gefen">גפן ${p.gefen}</span>
      </div>
    </div>`;
}
buildNav(); render(0);
</script>

      navigator.serviceWorker.register("../sw.js?v=359").then(registration => registration.update());
