}
.a4, .a4 * { text-rendering: optimizeLegibility; }

.nav {

 gap: 6px;
 flex-wrap: wrap;

}
.nav-btn {

.nav-btn.active,

.page-wrap {

}

.a4 {

.top-meta-label .meta-main {

}

}

.a4-banner-text { flex: 1; min-width: 0; }
.a4-logo {

}

.gefen-label { font-size: 10px; font-weight: 800; letter-spacing: 0.04em; color: var(--c0); }
.gefen-number { font-size: 14.5px; font-weight: 900; color: var(--c0); }
.a4-title {

.a4-subtitle {

}

.badge {

}

}

.a4-body {

}

.info-section {

.section-title {

 margin: 0 0 5px;

}

}

}

}
.idea-card {

.split-grid {

}
.mini-card {

}

.mini-card .section-body { font-size: 11.85px; line-height: 1.56; }
.skills-card {
 padding: 10px 12px;
 border: 1px solid #DDE5EC;
 border-radius: 10px;
 background: #FFFFFF;

}
.pill-row {

}
.pill {

}

}
.outcome-box-grid {

 grid-template-columns: repeat(2, minmax(0, 1fr));

 margin-top: 2px;
}
.outcome-item {

 padding: 7px 8px;

 border: 1px solid var(--c3);
 background: #F8FAFC;
 color: #1E2D3D;
 display: flex;
 align-items: center;
 justify-content: center;
 text-align: center;
 font-size: 11.4px;
 line-height: 1.32;
 font-weight: 800;
}

.course-grid .outcome-box-grid {

 gap: 5px;
}
.course-grid .outcome-item {

 padding: 5px 8px;
 font-size: 11.15px;
 line-height: 1.25;
}
.course-description .section-body p {
 margin: 0 0 10px;
}
.course-description .section-body p:last-of-type {
 margin-bottom: 0;
}
.inline-outcomes-wrap {
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px dashed #D6E0E8;
}
.inline-outcomes-label {
  margin-bottom: 6px;
  font-size: 10.4px;
  font-weight: 900;
  color: var(--c0);
  line-height: 1.15;
}
.inline-outcomes-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 5px;
}
.inline-outcomes-grid .outcome-item {
  flex: 0 1 118px;
  min-width: 112px;
  max-width: 132px;
  min-height: 30px;
  padding: 5px 7px;
  border-radius: 8px;
  border: 1px solid var(--c3);
  background: #F8FAFC;
  color: #1E2D3D;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 10.25px;
  line-height: 1.18;
  font-weight: 800;
}
.full-width-card {
 margin-bottom: 9px;
}
.school-card {
 padding: 10px 13px;
 border: 1px solid #D8E1E8;
 border-radius: 10px;
 background: #FAFBFC;
}

.syllabus-wrap {
 margin-bottom: 9px;
 background: #FFFFFF;
 border: 1px solid #DDE5EC;
 border-radius: 10px;
 overflow: visible;
}
.syllabus-header {
 font-size: 11px;
 font-weight: 900;
 color: var(--c0);
 background: #F8FAFC;
 border-bottom: 1px solid #E3E9EF;
 border-right: 5px solid var(--c1);
 padding: 6px 12px;
 line-height: 1.25;
}
.syllabus-toggle {
 cursor: pointer;
 user-select: none;
 display: flex;
 align-items: center;
 justify-content: space-between;
}
.syllabus-toggle::after {
 content: "▼";
 font-size: 10px;
 margin-inline-start: 8px;
 transition: transform .2s ease;
 flex-shrink: 0;
 opacity: .75;
}
.syllabus-toggle[aria-expanded="true"]::after {
 transform: rotate(180deg);
}
.syllabus-table {
 width: 100%;
 border-collapse: collapse;
 font-size: 11.7px;
}
.syllabus-table th {
 background: var(--c0);
 color: #FFFFFF;
 font-size: 10.6px;
 padding: 5px 8px;
 font-weight: bold;
 text-align: center;
 line-height: 1.3;
 border-left: 1px solid #DDE5EC;
 border-bottom: 1px solid #DDE5EC;
 -webkit-print-color-adjust: exact;
 print-color-adjust: exact;
}
.syllabus-table th:last-child { text-align: right; border-left: none; }
.syllabus-table th:first-child { text-align: center; width: 36px; }
.syllabus-table td {
 padding: 5px 8px;
 border-bottom: 1px solid #E4EAEF;
 border-left: 1px solid #E4EAEF;
 vertical-align: top;
 line-height: 1.42;
}
.syllabus-table td:last-child { border-left: none; }
.syllabus-table tr:last-child td { border-bottom: none; }
.syllabus-table tr:nth-child(even) td { background: #FAFBFC; }
.syl-num {
 color: var(--c0);
 font-weight: bold;
 width: 48px;
 text-align: center;
}
.syl-topic {
 font-weight: bold;
 color: #1E2D3D;
 width: 138px;
 text-align: right;
}
.syl-desc { color: #3C4854; text-align: right; }

.section-body { white-space: pre-line; }
.course-main-grid {
 display: grid;
 grid-template-columns: 1fr 1fr;
 gap: 10px;
 margin-bottom: 9px;
}
.course-card {
 break-inside: avoid;
}
.course-description .section-body {
 column-count: 1;
 column-gap: 0;
 column-rule: none;
 font-size: 12.9px;
 line-height: 1.45;
}
.course-card .section-body {
 font-size: 11.6px;
 line-height: 1.47;
}
.course-card.idea-card .section-body {
 font-weight: 600;
}
.course-grid .section-body {
 font-size: 11.25px;
 line-height: 1.45;
}
.badge strong {
 font-weight: 900;
 color: var(--c0);
}

.a4-footer {
 margin-top: auto;
 padding: 8px 10mm;
 background: #F8FAFC;
 border-top: 1px solid #E1E7ED;
 display: flex;
 justify-content: center;
 align-items: center;
 text-align: center;
}
.a4-footer-brand {
 font-size: 9px;
 color: #516170;
 font-weight: bold;
 text-align: center;
}

.a4-contact {
 text-align: center;
 font-size: 12.5px;
 font-weight: 700;
 color: #1e3a5f;
 direction: rtl;
 letter-spacing: 0.01em;
 padding: 0 10mm 6px;
}

.print-btn {
  margin-top: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
}
.print-btn button {
 font-size: 14px;
 padding: 10px 28px;
 border: none;
 border-radius: 8px;
 background: #3A5068;
 color: #fff;
 cursor: pointer;
 font-family: "Assistant", Arial, sans-serif;
 font-weight: bold;
}
.print-btn button:hover { opacity: 0.85; }
.back-btn {
  display: inline-block;
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid #C7D1DA;
  background: #fff;
  color: #3A4E62;
  text-decoration: none;
  font-family: "Assistant", Arial, sans-serif;
  font-weight: bold;
  white-space: nowrap;
  transition: all .15s;
}
.back-btn:hover { background: #EEF2F5; border-color: #9AAAB8; }

.catalog-toolbar {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 10002;
  display: none;
  gap: 8px;
  align-items: center;
  padding: 8px;
  border: 1px solid #D8E1E8;
  border-radius: 999px;
  background: rgba(255,255,255,.94);
  box-shadow: 0 4px 14px rgba(0,0,0,0.10);
}
body.catalog-view .catalog-toolbar { display: flex; }
body.client-view .nav,
body.client-view .print-btn,
body.client-view .nav-toggle,
body.client-view .catalog-toolbar,
body.client-view .catalog-print-btn,
body.client-view .back-btn,
body.client-view .catalog-gen-link { display: none !important; }
.catalog-toolbar .back-btn { font-size: 12px; }
.catalog-print-btn {
  border: 0;
  border-radius: 999px;
  padding: 6px 14px;
  background: #3A5068;
  color: #fff;
  font: 800 12px "Assistant", Arial, sans-serif;
  cursor: pointer;
}
.catalog-opening-frame {
  width: 210mm;
  min-width: 210mm;
  max-width: 210mm;
  height: 297mm;
  min-height: 297mm;
  max-height: 297mm;
  border: 0;
  display: block;
  margin: 0 auto;
  background: #fff;
  box-shadow: 0 4px 18px rgba(0,0,0,0.08);
  page-break-after: always;

  overflow: hidden;
}
body.catalog-view #a4-container {
  display: flex;
  flex-direction: column;
  align-items: center;

@media print {

 .catalog-float-to-index { display: none !important; }
}
@media print {
 @page { size: A4; margin: 0; }
 .nav, .print-btn, .nav-toggle, .catalog-gen-link, .catalog-toolbar { display: none !important; }
 html, body { width: 210mm; margin: 0; padding: 0; background: #fff; }
 .page-wrap { padding: 0; }
 .a4 {

 max-width: 210mm;
 box-shadow: none;
 border-radius: 0;

 page-break-after: always;

 }
 .top-meta-label {

 }

}

}

body.client-digital-catalog #a4-container {

}

.client-catalog-viewport {

.client-catalog-viewport.is-transitioning {

body.client-view.catalog-view .catalog-course-nav {

body.client-view.catalog-view .catalog-course-nav-secondary {

body.client-view.catalog-view .catalog-nav-prev,
body.client-view.catalog-view .catalog-nav-index,
body.client-view.catalog-view .catalog-nav-next {

  border: 0;

  cursor: pointer;
  font-family: "Assistant", Arial, sans-serif;

body.client-view.catalog-view .catalog-nav-prev:hover,

body.client-view.catalog-view .catalog-nav-prev:disabled,

body.client-view.catalog-view .client-syllabus .syllabus-table {

body.client-view.catalog-view .client-syllabus-session {

body.client-view.catalog-view .client-syllabus-desc {

@media screen and (max-width: 768px) {
  body.client-view.catalog-view .catalog-cover-continue-wrap {

  body.client-view.catalog-view .catalog-cover-continue {

  body.client-view.catalog-view .catalog-course-nav {

      "prev next"

@media print {

  body.client-digital-catalog .catalog-cover-continue-wrap,

</style>
</head>
<body>
<button class="nav-toggle" type="button" aria-label="פתיחת רשימת קורסים" aria-expanded="false">☰</button>
<div class="catalog-toolbar" id="catalogToolbar" aria-label="פעולות קטלוג קורסים">
  <a class="back-btn" href="./workshops.html?catalog=courses">← חזרה לבחירה</a>
  <button class="catalog-print-btn" type="button" onclick="window.print()">🖨 הדפסה / PDF</button>
</div>
<div class="nav-overlay" aria-hidden="true"></div>
<div class="nav" id="nav"></div>
<div class="page-wrap">
 <div id="a4-container"></div>
 <div class="print-btn">
   <a class="back-btn" href="./workshops.html?catalog=courses">← חזרה</a>
 </div>
</div>
<script>
let programs = [];

const LOGO = "logo.png";

function escapeHtml(value) {
 return String(value ?? "")
 .replace(/&/g, "&amp;")
 .replace(/</g, "&lt;")
 .replace(/>/g, "&gt;")
 .replace(/"/g, "&quot;")
 .replace(/'/g, "&#039;");
}

function stableProgramId(program = {}) {
 const explicitId = String(program.id ?? "").trim();
 if (explicitId) return explicitId;
 const gefen = String(program.gefen ?? "").trim();
 if (gefen) return `gefen-${gefen.replace(/\s+/g, "-")}`;
 return String(program.title ?? "program")
   .trim()
   .toLowerCase()
   .replace(/[^\p{L}\p{N}]+/gu, "-")
   .replace(/^-+|-+$/g, "") || "program";
}

function normalizeProgram(program = {}) {
 const textFields = ["gefen", "activityNo", "catalogSection", "itemType", "title", "subtitle", "grades", "domain", "sessions", "duration", "opening", "core", "short", "goals", "flow", "develops", "outcome", "school"];
 const normalized = { ...program };
 textFields.forEach(field => { normalized[field] = String(program[field] ?? ""); });
 normalized.id = stableProgramId(program);
 normalized.audienceLevel = String(program.audienceLevel ?? "").trim();
 normalized.skills = Array.isArray(program.skills) ? program.skills.filter(Boolean) : [];
 normalized.skillGroups = Array.isArray(program.skillGroups) ? program.skillGroups.filter(g => g && typeof g === "object" && g.title) : [];
 normalized.syllabus = Array.isArray(program.syllabus) ? program.syllabus : [];
 normalized.c0 = program.c0 || "#2F6F68";
 normalized.c1 = program.c1 || "#3B8C7F";
 normalized.c2 = program.c2 || "#6FAFA5";
 normalized.c3 = program.c3 || "#CFE7E1";
 normalized.c4 = program.c4 || "#EEF8F5";
 normalized.c5 = program.c5 || normalized.c0;
 normalized.c6 = program.c6 || normalized.c1;
 normalized.courseLayout = Boolean(program.courseLayout);
 normalized.showLearningFlow = Boolean(program.showLearningFlow);
 normalized.showInlineOutcomes = Boolean(program.showInlineOutcomes);
 return normalized;
}

function setActiveNav(index) {
 const activeId = index >= 0 && programs[index] ? programs[index].id : null;
 document.querySelectorAll(".nav-btn").forEach(btn => {
   btn.classList.toggle("active", btn.dataset.programId === activeId);
 });
}

function buildNav(activeIndex = 0) {
 const nav = document.getElementById("nav");
 nav.innerHTML = "";
 const activeProgram = programs[activeIndex];
 const activeId = activeProgram ? activeProgram.id : null;
 const activeLevel = activeProgram ? activeProgram.audienceLevel : "";

 const levels = [
   { label: "יסודי",  keys: ["elementary", "elementary-middle"] },
   { label: "חטיבה", keys: ["middle", "middle-high"] },
   { label: "תיכון",  keys: ["high", "high-middle"] },
 ];

 const activeGroup = levels.find(({ keys }) => keys.includes(activeLevel));
 const keysToShow = activeGroup ? activeGroup.keys : levels.flatMap(l => l.keys);

 const group = programs.filter(p => keysToShow.includes(p.audienceLevel));
 group.forEach(p => {
   const btn = document.createElement("button");
   btn.className = "nav-btn" + (p.id === activeId ? " active" : "");
   btn.style.setProperty('--c0', p.c0);
   btn.style.setProperty('--c1', p.c1);
   btn.style.setProperty('--c3', p.c3);
   btn.style.setProperty('--c4', p.c4);
   btn.textContent = p.title;
   btn.dataset.programId = p.id;
   btn.onclick = () => selectProgram(programs.indexOf(p), true);
   nav.appendChild(btn);
 });

 const footer = document.createElement("div");
 footer.className = "nav-pdf-footer";
 const pdfBtn = document.createElement("button");
 pdfBtn.className = "nav-pdf-btn";
 pdfBtn.type = "button";
 pdfBtn.textContent = "PDF";
 pdfBtn.addEventListener("click", () => {
   nav.classList.remove("open");
   document.querySelector(".nav-overlay")?.classList.remove("open");
   document.body.classList.remove("nav-open");
   setTimeout(() => window.print(), 120);
 });
 footer.appendChild(pdfBtn);
 nav.appendChild(footer);
}

function findProgramIndexFromUrl() {
 const params = new URLSearchParams(window.location.search);
 const requestedId = params.get("id");
 const requestedGefen = params.get("gefen");
 if (requestedId) return programs.findIndex(program => program.id === requestedId);
 if (requestedGefen) return programs.findIndex(program => String(program.gefen) === requestedGefen);
 return 0;
}

function selectProgram(index, pushUrl = false) {
 if (index < 0 || index >= programs.length) return;
 render(index);
 setActiveNav(index);
 scheduleA4Fit();
 if (pushUrl) {
   const url = `./course-page.html?id=${encodeURIComponent(programs[index].id)}`;
   history.pushState({ programId: programs[index].id }, "", url);
 }
}

function buildSkills(p) {
 const items = Array.isArray(p.skills) && p.skills.length ? p.skills : String(p.develops || "").split(",").map(s => s.trim()).filter(Boolean);
 return items.map(s => `<span class="pill">${escapeHtml(s)}</span>`).join("");
}

function buildSkillsTags(p) {
 const items = Array.isArray(p.skills) && p.skills.length ? p.skills : String(p.develops || "").split(",").map(s => s.trim()).filter(Boolean);
 return `<div class="skills-tags">${items.map(item => `<span class="skill-tag">${escapeHtml(item)}</span>`).join("")}</div>`;
}

function getOutcomeItems(p) {
 return String(p.outcome || "").split(/\n|•/).map(s => s.trim()).filter(Boolean);
}

function buildOutcome(p, mode = "default") {
 const items = getOutcomeItems(p);
 if (items.length > 1) {
 const gridClass = mode === "inline" ? "inline-outcomes-grid" : "outcome-box-grid";
 return `<div class="${gridClass}">${items.map(item => `<div class="outcome-item">${escapeHtml(item)}</div>`).join("")}</div>`;
 }
 return `<div class="section-body">${escapeHtml(p.outcome || "")}</div>`;
}

function hexToRgbString(hex) {
 const clean = String(hex || "").replace("#", "").trim();
 if (!/^[0-9a-fA-F]{6}$/.test(clean)) return "78,104,128";
 const r = parseInt(clean.slice(0, 2), 16);
 const g = parseInt(clean.slice(2, 4), 16);
 const b = parseInt(clean.slice(4, 6), 16);
 return `${r},${g},${b}`;
}

function cleanGradeLabel(value) {
 return String(value || "").replace(/^כיתות\s+/, "").trim();
}

function buildTopMetaLabel(p) {
 const items = [
 `<span class="meta-main">מספר גפ״ן ${escapeHtml(p.gefen)}</span>`,
 `<span class="meta-value">${escapeHtml(cleanGradeLabel(p.grades))}</span>`,
 `<span class="meta-value">${escapeHtml(p.sessions)}</span>`,
 `<span class="meta-value">${escapeHtml(p.duration)}</span>`
 ];
 return `<div class="top-meta-row"><img class="top-meta-logo" src="${LOGO}" alt="לוגו תעשיידע"><div class="top-meta-label">${items.map((item, index) => index > 0 ? `<span class="meta-separator"></span>${item}` : item).join("")}</div></div>`;
}

function buildLearningFlow() {
 const steps = ["חוקרים", "מתכננים", "מפתחים", "משפרים", "מציגים"];
 return `<div class="learning-flow-strip">${steps.map(step => `<div class="learning-flow-step">${escapeHtml(step)}</div>`).join("")}</div>`;
}

function buildSkillsGroups(p) {
 if (Array.isArray(p.skillGroups) && p.skillGroups.length) {
   const cards = p.skillGroups.map(group => {
     const title = escapeHtml(group.title || "");
     const items = Array.isArray(group.items)
       ? group.items.map(item => `<div class="skill-group-item">${escapeHtml(item)}</div>`).join("")
       : "";
     return `<div class="skill-group-card"><div class="skill-group-title">${title}</div><div class="skill-group-items">${items}</div></div>`;
   }).join("");
   return `<div class="skills-group-grid">${cards}</div>`;
 }
 return buildSkillsTags(p);
}


function syllabusStageClass(n) {
 const num = Number(n);
 if (num >= 1 && num <= 4) return "stage-nature";
 if (num >= 5 && num <= 6) return "stage-tech";
 if (num >= 7 && num <= 10) return "stage-product";
 return "";
}

function buildCourseDescription(p) {
 const paragraphs = String(p.goals || "").split(/\n\s*\n/).map(s => s.trim()).filter(Boolean);
 let html = p.showLearningFlow ? buildLearningFlow() : "";
 html += paragraphs.map(par => `<p>${escapeHtml(par)}</p>`).join("");
 if (p.showInlineOutcomes) {
   html += `<div class="inline-outcomes-wrap"><div class="inline-outcomes-label">תוצרי סיום</div>${buildOutcome(p, "inline")}</div>`;
 }
 return html || escapeHtml(p.goals || "");
}

function syllabusRowsClass(rowCount) {
 if (rowCount <= 8) return "syl-rows-8";
 if (rowCount <= 10) return "syl-rows-10";
 if (rowCount <= 12) return "syl-rows-12";
 return "syl-rows-14";
}

function buildSyllabus(p, clientFormat = false) {
 const rows = Array.isArray(p.syllabus) ? p.syllabus : [];
 if (!rows.length) return '';
 const rowsClass = syllabusRowsClass(rows.length);
 if (clientFormat) {
   return `<div class="syllabus-wrap client-syllabus ${rowsClass}">
 <div class="syllabus-header syllabus-toggle" role="button" tabindex="0" aria-expanded="false">סילבוס הקורס</div>
 <div class="syllabus-body" style="display:none">
 <div class="client-syllabus-list">${rows.map(r => `<div class="client-syllabus-item ${syllabusStageClass(r.n)}">
 <div class="client-syllabus-session">מפגש ${escapeHtml(r.n)}: ${escapeHtml(r.topic)}</div>
 <div class="client-syllabus-desc">${escapeHtml(r.desc)}</div>
 </div>`).join("")}</div>
 </div></div>`;
 }
 return `<div class="syllabus-wrap ${rowsClass}">
 <div class="syllabus-header syllabus-toggle" role="button" tabindex="0" aria-expanded="false">סילבוס הקורס</div>
 <div class="syllabus-body" style="display:none">
 <table class="syllabus-table">
 <thead><tr><th>מפגש</th><th style="text-align:right">נושא</th><th style="text-align:right">תיאור</th></tr></thead>
 <tbody>${rows.map(r=>`<tr class="${syllabusStageClass(r.n)}">
 <td class="syl-num">${escapeHtml(r.n)}</td>
 <td class="syl-topic">${escapeHtml(r.topic)}</td>
 <td class="syl-desc">${escapeHtml(r.desc)}</td>
 </tr>`).join('')}</tbody>
 </table></div></div>`;
}

function contactLineHTML(marketer) {
 if (marketer === "yael") {
   return `<div class="a4-contact">לפרטים נוספים: יעל אביב &nbsp;–&nbsp; 054-7790073 &nbsp;|&nbsp; <a href="mailto:yael_aviv@think.org.il" style="color:inherit;text-decoration:none;">yael_aviv@think.org.il</a></div>`;
 }
 if (marketer === "israa") {
   return `<div class="a4-contact">לפרטים נוספים: איסראא אבו-ראס &nbsp;–&nbsp; 054-5419396 &nbsp;|&nbsp; <a href="mailto:esraas@think.org.il" style="color:inherit;text-decoration:none;">esraas@think.org.il</a></div>`;
 }
 return "";
}

function courseNeedsWideSyllabusTopic(p) {
 return String(p.title || "").includes("השמיים אינם הגבול");
}

function buildProgramPageHtml(p, marketer = "none", coursePosition = null, courseTotal = null, includeBackToIndex = false, options = {}) {
 const { clientCatalog = false } = options;
 const style = `--c0:${p.c0};--c1:${p.c1};--c2:${p.c2};--c3:${p.c3};--c4:${p.c4};--c5:${p.c5};--c6:${p.c6};--theme-rgb:${hexToRgbString(p.c1)}`;
 const contactLine = contactLineHTML(marketer);
 const courseId = escapeHtml(p.id || "");
 const courseAnchorId = courseId ? ` id="course-${courseId}"` : "";
 const backToIndexLink = includeBackToIndex ? `<a class="catalog-back-to-index" href="#catalog-index">↑ חזרה לכל התוכניות</a>` : "";
 const courseTag = "";
 const syllabusHtml = (program) => buildSyllabus(program, clientCatalog);

 if (p.courseLayout) {
 const skeletonExtraClass = courseNeedsWideSyllabusTopic(p) ? " syl-topic-wide" : "";
 return `
 <div class="a4 a4-course-skeleton${skeletonExtraClass}"${courseAnchorId} style="${style}">
 ${backToIndexLink}
 ${courseTag}
 ${buildTopMetaLabel(p)}
 <p class="a4-opening">${escapeHtml(p.opening)}</p>
 <div class="a4-banner">
 <div class="a4-banner-text">
 <h1 class="a4-title">${escapeHtml(p.title)}</h1>
 <p class="a4-subtitle">${escapeHtml(p.subtitle)}</p>
 <div class="a4-badges">
 <span class="badge badge-domain">${escapeHtml(p.domain)}</span>
 </div>
 </div>
 </div>
 <div class="a4-body">
 <section class="info-section text-only-section course-summary">
 <div class="section-title">תקציר</div>
 <div class="section-body">${escapeHtml(p.short)}</div>
 </section>

 <section class="info-section text-only-section core-plain-card">
 <div class="section-body">${escapeHtml(p.core)}</div>
 </section>

 <section class="info-section learning-process-section course-description">
 <div class="section-title">תיאור הקורס</div>
 <div class="section-body">${buildCourseDescription(p)}</div>
 </section>

 <section class="info-section text-only-section full-width-card">
 <div class="section-title">כלים ומיומנויות</div>
 <div class="section-body">${buildSkillsGroups(p)}</div>
 </section>
 <div class="program-domain-strip domain-before-syllabus">${escapeHtml(p.domain)}</div>
 ${syllabusHtml(p)}

 <section class="info-section school-value-after-syllabus">
 <div class="section-body">${escapeHtml(p.school)}</div>
 </section>
 </div>
 ${contactLine}
 <div class="a4-footer">
 <span class="a4-footer-brand">© כל הזכויות שמורות לתעשיידע – תעשייה למען חינוך מתקדם ע״ר</span>
 </div>
 </div>`;
 }

 return `
 <div class="a4"${courseAnchorId} style="${style}">
 ${backToIndexLink}
 ${courseTag}
 <p class="a4-opening">${escapeHtml(p.opening)}</p>
 <div class="a4-banner">
 <div class="a4-banner-text">
 <div class="a4-gefen"><span class="gefen-label">מס׳ גפ״ן</span><span class="gefen-number">${escapeHtml(p.gefen)}</span></div>
 <h1 class="a4-title">${escapeHtml(p.title)}</h1>
 <p class="a4-subtitle">${escapeHtml(p.subtitle)}</p>
 <div class="a4-badges">
 <span class="badge">${escapeHtml(p.grades)}</span>
 <span class="badge">${escapeHtml(p.sessions)}</span>
 <span class="badge">${escapeHtml(p.duration)}</span>
 <span class="badge badge-domain">${escapeHtml(p.domain)}</span>
 </div>
 </div>
 <img class="a4-logo" src="${LOGO}" alt="לוגו תעשיידע">
 </div>
 <div class="a4-body">
 <section class="info-section overview-card">
 <div class="section-title">על התוכנית</div>
 <div class="section-body">${escapeHtml(p.short)}</div>
 </section>

 <section class="info-section idea-card">
 <div class="section-title">הרעיון המרכזי</div>
 <div class="section-body">${escapeHtml(p.core)}</div>
 </section>

 <div class="split-grid">
 <section class="mini-card">
 <div class="section-title">איך לומדים</div>
 <div class="section-body">${escapeHtml(p.goals)}</div>
 </section>
 <section class="mini-card">
 <div class="section-title">מה עושים</div>
 <div class="section-body">${escapeHtml(p.flow)}</div>
 </section>
 </div>

 <div class="split-grid">
 <section class="skills-card">
 <div class="section-title">כלים ומיומנויות</div>
 <div class="pill-row">${buildSkills(p)}</div>
 </section>
 <section class="outcome-card">
 <div class="section-title">תוצר סיום</div>
 ${buildOutcome(p)}
 </section>
 </div>

 <section class="info-section school-card">
 <div class="section-title">ערך לבית הספר</div>
 <div class="section-body">${escapeHtml(p.school)}</div>
 </section>

 ${syllabusHtml(p)}
 </div>
 ${contactLine}
 <div class="a4-footer">
 <span class="a4-footer-brand">© כל הזכויות שמורות לתעשיידע – תעשייה למען חינוך מתקדם ע״ר</span>
 </div>
 </div>`;
}

const CATALOG_PAGE_TITLE = "קטלוג התוכניות החינוכיות של תעשיידע";

function setPageShareTitle(title) {
 document.title = title;
 document.querySelector('meta[property="og:title"]')?.setAttribute("content", title);
 document.querySelector('meta[name="twitter:title"]')?.setAttribute("content", title);
}

function isClientModeFromUrl() {
 const params = new URLSearchParams(window.location.search);
 return params.get("client") === "1";
}

function applyClientModeFromUrl() {
 const isClientMode = isClientModeFromUrl();
 document.body.classList.toggle("client-view", isClientMode);
 document.querySelectorAll(".nav, .nav-toggle, .print-btn, .catalog-toolbar, .catalog-print-btn, .back-btn, .catalog-gen-link").forEach(element => {
   if (isClientMode) {
     element.setAttribute("hidden", "hidden");
     element.setAttribute("aria-hidden", "true");
   } else {
     element.removeAttribute("hidden");
     element.removeAttribute("aria-hidden");
   }
 });
}

function render(i) {
 const p = programs[i];
 if (!p) return;
 setPageShareTitle(p.title ? `${p.title} – תעשיידע` : "קטלוג התוכניות החינוכיות של תעשיידע");
 document.getElementById("a4-container").innerHTML = buildProgramPageHtml(p);
}

function findProgramIndexesFromUrl() {
 const params = new URLSearchParams(window.location.search);
 const ids = String(params.get("ids") || "").split(",").map(id => id.trim()).filter(Boolean);
 if (!ids.length) return [];
 const indexById = new Map(programs.map((program, index) => [program.id, index]));
 return ids.map(id => indexById.get(id)).filter(index => index !== undefined);
}

function isCatalogModeFromUrl() {
 const params = new URLSearchParams(window.location.search);
 return params.get("catalog") === "1" || params.has("ids");
}

function buildCourseNavHtml(nextAnchor) {
  const nextLink = nextAnchor
    ? `<a class="catalog-nav-next" href="${nextAnchor}">לתוכנית הבאה ↓</a>`
    : `<span class="catalog-nav-end">סוף הקטלוג</span>`;
  return `<div class="catalog-course-nav" aria-label="ניווט בין תוכניות">
  <a class="catalog-nav-index" href="#catalog-index">↑ כל התוכניות</a>
  ${nextLink}
</div>`;
}

function buildIndexPageHtml(selectedPrograms, clientMode = false) {
  const levelLabel = { elementary: "יסודי", "elementary-middle": "יסודי–חטיבה", middle: "חטיבה", "middle-high": "חטיבה–תיכון", high: "תיכון" };
  const rows = selectedPrograms.map(p => {
    const courseId = escapeHtml(p.id || "");
    const anchor = clientMode ? "#" : (courseId ? `#course-${courseId}` : "#");
    const courseDataAttr = clientMode && courseId ? ` data-course-id="${courseId}"` : "";
    const title = escapeHtml(p.title || "—");
    return `
    <tr class="idx-row" data-href="${anchor}"${courseDataAttr}>
      <td class="idx-title"><a class="idx-course-link" href="${anchor}"${courseDataAttr}>${title}</a></td>
      <td class="idx-level">${escapeHtml(levelLabel[p.audienceLevel] || p.catalogSection || "—")}</td>
      <td class="idx-grades">${escapeHtml(p.grades || "—")}</td>
      <td class="idx-sessions">${escapeHtml(p.sessions || "—")}</td>
      <td class="idx-gefen">${escapeHtml(String(p.gefen || p.activityNo || "—"))}</td>
    </tr>`;
  }).join("");
  const mobileCards = selectedPrograms.map(p => {
    const courseId = escapeHtml(p.id || "");
    const anchor = clientMode ? "#" : (courseId ? `#course-${courseId}` : "#");
    const courseDataAttr = clientMode && courseId ? ` data-course-id="${courseId}"` : "";
    const title = escapeHtml(p.title || "—");
    const level = escapeHtml(levelLabel[p.audienceLevel] || p.catalogSection || "—");
    const grades = escapeHtml(p.grades || "—");
    const gefen = escapeHtml(String(p.gefen || p.activityNo || "—"));
    return `<div class="idx-mobile-card" data-href="${anchor}"${courseDataAttr} role="button" tabindex="0" aria-label="${title}">
  <div class="idx-mc-title">${title}</div>
  <div class="idx-mc-meta">${level} | כיתות ${grades}</div>
  <div class="idx-mc-gefen">גפ״ן: ${gefen}</div>
</div>`;
  }).join("");
  return `
  <div class="a4 index-page" id="catalog-index" style="page-break-after:always;break-after:page;">
    <div class="idx-header">
      <img class="idx-logo" src="logo.png" alt="תעשיידע">
      <div class="idx-title-block">
        <div class="idx-main-title">כל התוכניות</div>
        <div class="idx-sub-title">רשימת התוכניות הנכללות בקטלוג זה</div>
      </div>
    </div>
    <div class="idx-body">
      <table class="idx-table">
        <thead>
          <tr>
            <th class="idx-title">שם התוכנית</th>
            <th class="idx-level">שכבת גיל</th>
            <th class="idx-grades">כיתות</th>
            <th class="idx-sessions">מפגשים</th>
            <th class="idx-gefen">גפ״ן</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="idx-mobile-grid">${mobileCards}</div>
    </div>
    <div class="a4-footer">
      <span class="a4-footer-brand">© כל הזכויות שמורות לתעשיידע – תעשייה למען חינוך מתקדם ע״ר</span>
    </div>
  </div>`;
}

let clientCatalogState = null;
let clientCatalogNavBound = false;

function buildClientCoverHtml(marketer) {
  const openingParams = new URLSearchParams({ client: "1" });
  if (marketer && marketer !== "none") openingParams.set("marketer", marketer);
  const openingSrc = `./opening.html?${openingParams.toString()}`;
  return `<div class="digital-section digital-cover" id="client-catalog-cover">
    <div class="digital-cover-scale">
      <iframe class="catalog-opening-frame" src="${openingSrc}" title="מכתב מקדים לקטלוג הקורסים"></iframe>
      <div class="catalog-cover-continue-wrap">
        <button type="button" class="catalog-cover-continue" data-catalog-action="index">המשך לכל התוכניות</button>
      </div>
    </div>
  </div>`;
}

function buildClientCourseNavHtml(selectedPrograms, activeCourseId) {
  const currentIndex = selectedPrograms.findIndex(program => program.id === activeCourseId);
  const isFirst = currentIndex <= 0;
  const isLast = currentIndex < 0 || currentIndex >= selectedPrograms.length - 1;
  const prevBtn = `<button type="button" class="catalog-nav-prev" data-catalog-action="prev"${isFirst ? " disabled" : ""}>לתוכנית הקודמת ↑</button>`;
  const nextBtn = `<button type="button" class="catalog-nav-next" data-catalog-action="next"${isLast ? " disabled" : ""}>לתוכנית הבאה ↓</button>`;
  return `<div class="catalog-course-nav" aria-label="ניווט בין תוכניות">
    ${prevBtn}
    <button type="button" class="catalog-nav-index" data-catalog-action="index">↑ כל התוכניות</button>
    ${nextBtn}
  </div>`;
}

function resolveInitialClientView(includeCover) {
  const hash = window.location.hash.replace(/^#/, "");
  if (hash.startsWith("course-")) {
    const courseId = hash.slice("course-".length);
    if (clientCatalogState?.selectedPrograms.some(program => program.id === courseId)) {
      return { view: "course", courseId };
    }
  }
  if (hash === "catalog-index") return { view: "index", courseId: null };
  if (hash === "cover" && includeCover) return { view: "cover", courseId: null };
  if (!includeCover) return { view: "index", courseId: null };
  return { view: "cover", courseId: null };
}

function updateClientCatalogHash() {
  const state = clientCatalogState;
  if (!state) return;
  let hash = "";
  if (state.activeView === "cover") hash = "#cover";
  else if (state.activeView === "index") hash = "#catalog-index";
  else if (state.activeView === "course" && state.activeCourseId) hash = `#course-${state.activeCourseId}`;
  const nextUrl = location.pathname + location.search + hash;
  if (hash && location.pathname + location.search + location.hash !== nextUrl) {
    history.replaceState(null, "", nextUrl);
  }
}

function renderActiveClientView(animate = true) {
  const state = clientCatalogState;
  if (!state) return;
  const viewport = document.getElementById("client-catalog-viewport");
  if (!viewport) return;

  const doRender = () => {
    let html = "";
    if (state.activeView === "cover" && state.includeCover) {
      html = buildClientCoverHtml(state.marketer);
    } else if (state.activeView === "index" && state.includeIndex) {
      html = buildIndexPageHtml(state.selectedPrograms, true);
    } else if (state.activeView === "course" && state.activeCourseId) {
      const program = state.selectedPrograms.find(item => item.id === state.activeCourseId);
      if (program) {
        html = buildProgramPageHtml(program, state.marketer, null, null, false, { clientCatalog: true })
          + buildClientCourseNavHtml(state.selectedPrograms, state.activeCourseId);
      }
    }
    viewport.innerHTML = html;
    document.body.classList.toggle("client-catalog-on-cover", state.activeView === "cover");
    if (state.activeView === "cover") autosizeCatalogOpeningFrame();
    scheduleA4Fit();
    updateClientCatalogHash();
    window.scrollTo({ top: 0, behavior: animate ? "smooth" : "auto" });
  };

  if (animate) {
    viewport.classList.add("is-transitioning");
    window.setTimeout(() => {
      doRender();
      requestAnimationFrame(() => viewport.classList.remove("is-transitioning"));
    }, 160);
  } else {
    doRender();
  }
}

function showClientCover() {
  if (!clientCatalogState?.includeCover) return;
  clientCatalogState.activeView = "cover";
  clientCatalogState.activeCourseId = null;
  renderActiveClientView();
}

function showClientIndex() {
  if (!clientCatalogState?.includeIndex) return;
  clientCatalogState.activeView = "index";
  clientCatalogState.activeCourseId = null;
  renderActiveClientView();
}

function showClientCourse(courseId) {
  if (!clientCatalogState?.selectedPrograms.some(program => program.id === courseId)) return;
  clientCatalogState.activeView = "course";
  clientCatalogState.activeCourseId = courseId;
  renderActiveClientView();
}

function showClientNextCourse() {
  const state = clientCatalogState;
  if (!state?.activeCourseId) return;
  const currentIndex = state.selectedPrograms.findIndex(program => program.id === state.activeCourseId);
  const nextProgram = state.selectedPrograms[currentIndex + 1];
  if (nextProgram) showClientCourse(nextProgram.id);
}

function showClientPreviousCourse() {
  const state = clientCatalogState;
  if (!state?.activeCourseId) return;
  const currentIndex = state.selectedPrograms.findIndex(program => program.id === state.activeCourseId);
  const previousProgram = state.selectedPrograms[currentIndex - 1];
  if (previousProgram) showClientCourse(previousProgram.id);
}

function onClientCatalogHashChange() {
  if (!clientCatalogState) return;
  const initial = resolveInitialClientView(clientCatalogState.includeCover);
  if (
    initial.view !== clientCatalogState.activeView
    || initial.courseId !== clientCatalogState.activeCourseId
  ) {
    clientCatalogState.activeView = initial.view;
    clientCatalogState.activeCourseId = initial.courseId;
    renderActiveClientView(false);
  }
}

function bindClientCatalogNavigation() {
  if (clientCatalogNavBound) return;
  clientCatalogNavBound = true;
  const container = document.getElementById("a4-container");
  if (!container) return;

  container.addEventListener("click", event => {
    if (!clientCatalogState) return;
    const actionBtn = event.target.closest("[data-catalog-action]");
    if (actionBtn) {
      event.preventDefault();
      const action = actionBtn.dataset.catalogAction;
      if (action === "index") showClientIndex();
      else if (action === "cover") showClientCover();
      else if (action === "next") showClientNextCourse();
      else if (action === "prev") showClientPreviousCourse();
      return;
    }
    const courseTarget = event.target.closest("[data-course-id]");
    if (courseTarget) {
      event.preventDefault();
      showClientCourse(courseTarget.dataset.courseId);
    }
  });

  container.addEventListener("keydown", event => {
    if (!clientCatalogState) return;
    if (event.key !== "Enter" && event.key !== " ") return;
    const card = event.target.closest(".idx-mobile-card[data-course-id]");
    if (!card) return;
    event.preventDefault();
    showClientCourse(card.dataset.courseId);
  });

  window.addEventListener("hashchange", onClientCatalogHashChange, { passive: true });
}

function renderClientDigitalCatalog(selectedPrograms, includeCover = false, includeIndex = false, marketer = "none") {
  clientCatalogState = {
    selectedPrograms,
    includeCover,
    includeIndex,
    marketer,
    activeView: "cover",
    activeCourseId: null
  };

  setPageShareTitle(CATALOG_PAGE_TITLE);
  document.body.classList.add("catalog-view", "catalog-courses-print", "client-digital-catalog");
  applyClientModeFromUrl();
  document.querySelector(".nav-toggle")?.setAttribute("hidden", "hidden");
  document.getElementById("nav")?.setAttribute("hidden", "hidden");
  document.getElementById("catalogFloatToIndex")?.remove();

  const initial = resolveInitialClientView(includeCover);
  clientCatalogState.activeView = initial.view;
  clientCatalogState.activeCourseId = initial.courseId;

  if (!includeIndex && initial.view === "index") {
    const firstProgram = selectedPrograms[0];
    clientCatalogState.activeView = firstProgram ? "course" : (includeCover ? "cover" : "index");
    clientCatalogState.activeCourseId = firstProgram?.id || null;
  }

  document.getElementById("a4-container").innerHTML = '<div id="client-catalog-viewport" class="client-catalog-viewport"></div>';
  bindClientCatalogNavigation();
  renderActiveClientView(false);
}

function renderCourseCatalog(indexes, includeCover = false, includeIndex = false, marketer = "none") {
 const selectedPrograms = indexes.map(index => programs[index]).filter(Boolean);
 if (isClientModeFromUrl()) {
   renderClientDigitalCatalog(selectedPrograms, includeCover, includeIndex, marketer);
   return;
 }
 setPageShareTitle(CATALOG_PAGE_TITLE);
 document.body.classList.add("catalog-view", "catalog-courses-print");
 applyClientModeFromUrl();
 document.querySelector(".nav-toggle")?.setAttribute("hidden", "hidden");
 document.getElementById("nav")?.setAttribute("hidden", "hidden");
 const openingSrc = marketer && marketer !== "none" ? `./opening.html?marketer=${encodeURIComponent(marketer)}` : "./opening.html";
 const openingHtml = includeCover ? `<iframe class="catalog-opening-frame" src="${openingSrc}" title="מכתב מקדים לקטלוג הקורסים"></iframe>` : "";
 const indexHtml = includeIndex ? buildIndexPageHtml(selectedPrograms) : "";
 const totalCourses = selectedPrograms.length;
 const showBackToIndex = includeIndex && !isClientModeFromUrl();
 const coursePagesHtml = selectedPrograms.map((p, index) => {
   const separator = index > 0 ? `<div class="course-catalog-separator" aria-hidden="true"></div>` : "";
   const isLast = index === selectedPrograms.length - 1;
   const nextId = !isLast ? (selectedPrograms[index + 1].id || "") : null;
   const nextAnchor = nextId ? `#course-${escapeHtml(nextId)}` : null;
   const navHtml = includeIndex ? buildCourseNavHtml(nextAnchor) : "";
   return separator + buildProgramPageHtml(p, marketer, index + 1, totalCourses, showBackToIndex) + navHtml;
 }).join("");
 document.getElementById("a4-container").innerHTML = openingHtml + indexHtml + coursePagesHtml;
 scheduleA4Fit();
 bindIndexRowNavigation();
 setupCatalogIndexNavigation(includeIndex);
 if (includeCover) autosizeCatalogOpeningFrame();
}

const DIGITAL_COVER_SCALE = 0.9;

function getDigitalCoverMaxFrameHeight(frame) {
  const cover = frame.closest(".digital-cover");
  if (!cover) return null;
  const viewportHeight = window.visualViewport?.height || window.innerHeight;
  const buttonWrap = cover.querySelector(".catalog-cover-continue-wrap");
  const buttonVisualHeight = buttonWrap?.getBoundingClientRect().height || 72;
  return Math.max(160, Math.floor((viewportHeight - buttonVisualHeight - 4) / DIGITAL_COVER_SCALE));
}

function autosizeCatalogOpeningFrame() {
 const frame = document.querySelector(".catalog-opening-frame");
 if (!frame) return;
 const isDigitalCatalog = document.body.classList.contains("client-digital-catalog");
 const doResize = () => {
   try {
     const doc = frame.contentDocument || frame.contentWindow?.document;
     if (!doc) return;
     const h = Math.max(
       doc.documentElement.scrollHeight || 0,
       doc.documentElement.offsetHeight || 0,
       doc.body ? doc.body.scrollHeight : 0,
       doc.body ? doc.body.offsetHeight : 0
     );
     if (h > 100) {
       const maxFrameHeight = isDigitalCatalog ? getDigitalCoverMaxFrameHeight(frame) : null;
       const targetHeight = maxFrameHeight ? Math.min(h, maxFrameHeight) : h;
       frame.style.height = targetHeight + "px";
       frame.style.minHeight = isDigitalCatalog ? "0" : targetHeight + "px";
       if (isDigitalCatalog) {
         frame.style.width = "100%";
         frame.style.minWidth = "0";
         frame.style.maxWidth = "100%";
       }
       if (maxFrameHeight) frame.style.maxHeight = maxFrameHeight + "px";
     }
   } catch(e) {}
 };
 frame.addEventListener("load", doResize);
 if (frame.contentDocument && frame.contentDocument.readyState === "complete") doResize();
 if (isDigitalCatalog) {
   requestAnimationFrame(doResize);
   window.addEventListener("resize", doResize, { passive: true });
   window.visualViewport?.addEventListener("resize", doResize, { passive: true });
 }
}

function setupCatalogIndexNavigation(includeIndex) {
 const existing = document.getElementById("catalogFloatToIndex");
 const isClientMode = isClientModeFromUrl();
 if (!includeIndex || !isClientMode) {
   existing?.remove();
   document.body.classList.remove("catalog-has-index");
   return;
 }
 document.body.classList.add("catalog-has-index");
 let floatBtn = existing;
 if (!floatBtn) {
   floatBtn = document.createElement("a");
   floatBtn.id = "catalogFloatToIndex";
   floatBtn.className = "catalog-float-to-index";
   floatBtn.href = "#catalog-index";
   floatBtn.textContent = "↑ חזרה";
   floatBtn.setAttribute("aria-label", "חזרה למעלה");
   document.body.appendChild(floatBtn);
 }
 bindCatalogFloatIndexButton(floatBtn);
}

function bindCatalogFloatIndexButton(floatBtn) {
 const catalogIndex = document.getElementById("catalog-index");
 if (!floatBtn || !catalogIndex) return;

 const updateVisibility = () => {
   const indexRect = catalogIndex.getBoundingClientRect();
   const indexInView = indexRect.top < window.innerHeight * 0.55 && indexRect.bottom > 64;
   const onCourse = /^#course-/.test(window.location.hash);
   floatBtn.classList.toggle("is-visible", onCourse || !indexInView);
 };

 if (!floatBtn.dataset.catalogNavBound) {
   floatBtn.dataset.catalogNavBound = "1";
   floatBtn.addEventListener("click", function(e) {
     e.preventDefault();
     const top = catalogIndex
       ? catalogIndex.getBoundingClientRect().top + window.pageYOffset
       : 0;
     window.scrollTo({ top: Math.max(0, top), behavior: "smooth" });
     history.replaceState(null, "", catalogIndex ? "#catalog-index" : location.pathname + location.search);
     floatBtn.classList.remove("is-visible");
     setTimeout(updateVisibility, 500);
   });
   window.addEventListener("hashchange", updateVisibility, { passive: true });
   window.addEventListener("scroll", updateVisibility, { passive: true });
 }
 updateVisibility();
}

function scrollToCourseAnchor(href) {
 if (!href || href === "#") return;
 const id = href.replace(/^#/, "");
 const target = document.getElementById(id);
 if (!target) { window.location.hash = href; return; }
 const top = target.getBoundingClientRect().top + window.pageYOffset;
 window.scrollTo({ top: Math.max(0, top), behavior: "smooth" });
 history.pushState(null, "", href);
 const floatBtn = document.getElementById("catalogFloatToIndex");
 if (floatBtn) floatBtn.classList.add("is-visible");
}

function bindIndexRowNavigation() {
 document.querySelectorAll(".idx-table tbody tr.idx-row[data-href]").forEach(row => {
   row.addEventListener("click", event => {
     const link = event.target.closest("a.idx-course-link");
     if (link) {
       event.preventDefault();
       scrollToCourseAnchor(link.getAttribute("href"));
       return;
     }
     scrollToCourseAnchor(row.getAttribute("data-href"));
   });
 });
 document.querySelectorAll(".idx-mobile-card[data-href]").forEach(card => {
   card.addEventListener("click", () => {
     scrollToCourseAnchor(card.getAttribute("data-href"));
   });
   card.addEventListener("keydown", e => {
     if (e.key === "Enter" || e.key === " ") {
       e.preventDefault();
       scrollToCourseAnchor(card.getAttribute("data-href"));
     }
   });
 });
}

function showLoadError(msg, showBackLink = false) {
  const allowBackLink = showBackLink && !isClientModeFromUrl();
  const backLink = allowBackLink ? `<br><br><a href="./workshops.html?catalog=courses" style="display:inline-block;padding:10px 16px;border-radius:999px;background:#203b7a;color:#fff;text-decoration:none;">חזרה לבחירת קורסים</a>` : "";
  document.getElementById("a4-container").innerHTML =
    `<div style="direction:rtl;font-family:"Assistant",Arial,sans-serif;padding:40px;color:#c0392b;font-size:15px;text-align:center;">
      <strong>שגיאה בטעינת הנתונים</strong><br><br>${msg}${backLink}
    </div>`;
}

function showProgramNotFound() {
  showLoadError("התוכנית המבוקשת לא נמצאה בקובץ הנתונים.", true);
}

async function init() {
  applyClientModeFromUrl();
  try {
    const res = await fetch("catalog-data.json", { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!Array.isArray(data.programs) || data.programs.length === 0) {
      showLoadError("קובץ catalog-data.json ריק או חסר שדה programs.");
      return;
    }
    const levelOrder = { elementary: 1, "elementary-middle": 2, middle: 3, "middle-high": 4, high: 5 };
    programs = data.programs.map(program => normalizeProgram(program))
      .sort((a, b) => (levelOrder[a.audienceLevel] ?? 99) - (levelOrder[b.audienceLevel] ?? 99));
    if (isCatalogModeFromUrl()) {
      const params = new URLSearchParams(window.location.search);
      const requestedIndexes = findProgramIndexesFromUrl();
      if (!requestedIndexes.length) {
        showLoadError("לא נבחרו קורסים תקינים להפקת קטלוג.", true);
        return;
      }
      renderCourseCatalog(requestedIndexes, params.get("cover") === "1", params.get("index") === "1", params.get("marketer") || "none");
      return;
    }
    const requestedIndex = findProgramIndexFromUrl();
    setupCourseDrawer();
    if (requestedIndex === -1) {
      buildNav();
      showProgramNotFound();
      return;
    }
    buildNav(requestedIndex);
    selectProgram(requestedIndex, false);
  } catch (err) {
    showLoadError("לא ניתן לטעון את נתוני הקטלוג. בדקו שקובץ catalog-data.json קיים ותקין.<br><small>" + err.message + "</small>");
  }
}

function setupCourseDrawer() {
 const toggle = document.querySelector(".nav-toggle");
 const nav = document.querySelector(".nav");
 const overlay = document.querySelector(".nav-overlay");
 if (!toggle || !nav || !overlay) return;

 const closeDrawer = () => {
   nav.classList.remove("open");
   overlay.classList.remove("open");
   document.body.classList.remove("nav-open");
   toggle.setAttribute("aria-expanded", "false");
 };

 const openDrawer = () => {
   nav.classList.add("open");
   overlay.classList.add("open");
   document.body.classList.add("nav-open");
   toggle.setAttribute("aria-expanded", "true");
 };

 toggle.addEventListener("click", () => {
   if (nav.classList.contains("open")) closeDrawer();
   else openDrawer();
 });

 overlay.addEventListener("click", closeDrawer);

 document.addEventListener("keydown", (event) => {
   if (event.key === "Escape") closeDrawer();
 });

 nav.addEventListener("click", (event) => {
   if (event.target.closest(".nav-btn")) closeDrawer();
 });
}


init();

/* ── סילבוס toggle — event delegation ── */
document.getElementById("a4-container").addEventListener("click", function(e) {
  const toggle = e.target.closest(".syllabus-toggle");
  if (!toggle) return;
  const body = toggle.nextElementSibling;
  if (!body || !body.classList.contains("syllabus-body")) return;
  const isOpen = body.style.display !== "none";
  body.style.display = isOpen ? "none" : "";
  toggle.setAttribute("aria-expanded", String(!isOpen));
});
document.getElementById("a4-container").addEventListener("keydown", function(e) {
  if (e.key !== "Enter" && e.key !== " ") return;
  const toggle = e.target.closest(".syllabus-toggle");
  if (!toggle) return;
  e.preventDefault();
  toggle.click();
});

function clearLegacyA4FitClasses(a4) {
 const compressModes = ["fit-spacious", "fit-normal", "fit-compact", "fit-tight", "fit-ultra", "a4-fit-scaled", "a4-fill-active"];
 a4.classList.remove(...compressModes);
 a4.style.removeProperty("--a4-fit-scale");
 a4.style.removeProperty("--a4-fill-gap");
 a4.style.removeProperty("--a4-fill-pad");
}

function applyCourseSkeletonLayout() {
 const warning = document.getElementById("fit-warning");
 document.querySelectorAll(".a4.a4-course-skeleton").forEach(clearLegacyA4FitClasses);
 if (warning) warning.classList.remove("show");
}

function scheduleA4Fit() {
 requestAnimationFrame(applyCourseSkeletonLayout);
}

window.addEventListener("resize", scheduleA4Fit);
window.addEventListener("beforeprint", applyCourseSkeletonLayout);
window.addEventListener("popstate", () => {
 const index = findProgramIndexFromUrl();
 if (index === -1) {
   showProgramNotFound();
   setActiveNav(-1);
   return;
 }
 selectProgram(index, false);
});


document.addEventListener("click", function(event) {
 const courseButton = event.target.closest(".nav-btn");
 if (courseButton) {
   setTimeout(scheduleA4Fit, 0);
 }
});

</script>

<script>
