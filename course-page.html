<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קטלוג תוכניות – תעשיידע</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
 font-family: "Assistant", Arial, sans-serif;
 direction: rtl;
 background: #EEF2F5;
 color: #1E2D3D;
}
.a4, .a4 * { text-rendering: optimizeLegibility; }

.nav {
 display: flex;
 gap: 6px;
 flex-wrap: wrap;
 padding: 11px 18px 9px;
 border-bottom: 1px solid #D6DEE6;
 background: #F7F9FB;
 position: sticky;
 top: 0;
 z-index: 10;
}
.nav-btn {
 font-size: 11px;
 padding: 4px 11px;
 border-radius: 20px;
 border: 1px solid #C7D1DA;
 background: #fff;
 color: #3A4E62;
 cursor: pointer;
 font-family: "Assistant", Arial, sans-serif;
 font-weight: bold;
 transition: all .15s;
 white-space: nowrap;
}
.nav-btn.active,
.nav-btn:hover {
 background: var(--c4);
 border-color: var(--c2);
 color: var(--c0);
}

.page-wrap {
 padding: 28px 20px;
 display: flex;
 flex-direction: column;
 align-items: center;
}

.a4 {
 width: 210mm;
 min-height: 297mm;
 padding-top: 9mm;
 background: #fff;
 border: 1px solid #D7DEE6;
 border-radius: 0;
 display: flex;
 flex-direction: column;
 font-family: "Assistant", Arial, sans-serif;
 overflow: hidden;
 box-shadow: 0 4px 18px rgba(0,0,0,0.08);
}


.top-meta-label {
  width: fit-content;
  max-width: calc(100% - 20mm);
  margin: 0 auto 1.5mm;
  padding: 5px 14px 6px;
  background: #FFFFFF;
  border: 1px solid #D8E1E8;
  border-top: 3px solid var(--c1);
  border-radius: 0 0 12px 12px;
  box-shadow: 0 2px 7px rgba(0,0,0,0.06);
  color: var(--c0);

  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  gap: 5px 9px;
  text-align: center;
  font-weight: 900;
  line-height: 1.15;
}

.top-meta-label .meta-main {
 font-size: 12px;
 color: var(--c0);
}

.top-meta-label .meta-value {
 font-size: 11.2px;
 color: #2D3E50;
}

.top-meta-label .meta-separator {
 width: 4px;
 height: 4px;
 border-radius: 50%;
 background: var(--c2);
 opacity: 0.55;
}

.a4-opening {

 margin: 0 10mm 3.5mm;
 min-height: 36px;
 padding: 8px 16px;

 line-height: 1.5;
 font-style: italic;
 font-weight: bold;
 color: var(--c0);
 background: #F7F9FB;
 border: 1px solid #E1E7ED;
 border-right: 5px solid var(--c2);
 border-radius: 8px;
 text-align: center;
 display: flex;
 align-items: center;
 justify-content: center;
}

.a4-banner {

 margin: 0 10mm 6mm;
 min-height: 82px;
 padding: 30px 18px 18px;

 border-top: 5px solid var(--c1);
 border-right: 5px solid var(--c1);
 border-radius: 10px;

 align-items: center;
 justify-content: space-between;
 gap: 18px;
 position: relative;
 overflow: visible;
}
.a4-banner-text { flex: 1; min-width: 0; }
.a4-logo {

 height: 58px;
 object-fit: contain;
 flex-shrink: 0;
 background: rgba(255,255,255,0.68);
 border-radius: 6px;
 align-self: flex-start;
 margin-top: -10px;
}
.a4-gefen {
 position: absolute;
 top: -1px;
 right: 18px;
 display: inline-flex;
 align-items: center;
 gap: 5px;
 padding: 5px 12px 6px;
 background: #FFFFFF;
 color: var(--c0);
 border: 1px solid #D0DAE2;
 border-top: none;
 border-radius: 0 0 12px 12px;
 box-shadow: 0 3px 8px rgba(0,0,0,0.09);
 font-weight: bold;
 line-height: 1;
 z-index: 3;
}
.gefen-label { font-size: 10px; font-weight: 800; letter-spacing: 0.04em; color: var(--c0); }
.gefen-number { font-size: 14.5px; font-weight: 900; color: var(--c0); }
.a4-title {

 font-weight: bold;
 color: var(--c0);
 line-height: 1.12;
 margin-bottom: 4px;
}
.a4-subtitle {

 color: #0f172a;
 margin-bottom: 11px;
 line-height: 1.35;
}
.a4-badges {

 gap: 7px;
 flex-wrap: wrap;
}
.badge {

 padding: 3px 10px;
 border-radius: 20px;
 background: #FFFFFF;
 color: var(--c0);
 border: 1px solid var(--c3);
 font-weight: bold;
 line-height: 1.25;
}
.badge-domain {
 max-width: 260px;
 overflow-wrap: break-word;
}

.a4-body {
 padding: 0 10mm 13px;
 display: flex;
 flex-direction: column;
 flex: 1;
}

.info-section {
 margin-bottom: 9px;
}
.section-title {
 display: inline-flex;
 align-items: center;
 gap: 7px;
 margin: 0 0 5px;
 font-size: 11px;
 font-weight: 900;
 color: var(--c0);
 line-height: 1.2;
}
.section-title::before {
 content: "";
 display: inline-block;
 width: 6px;
 height: 18px;
 border-radius: 20px;
 background: var(--c1);
}
.section-body {
 font-size: 12.15px;
 color: #1E2D3D;
 line-height: 1.62;
}
.overview-card {
 padding: 10px 13px;
 border: 1px solid #DDE5EC;
 border-radius: 10px;
 background: #FFFFFF;
}
.idea-card {
 padding: 10px 15px 10px 13px;

 border-right: 5px solid var(--c1);
 border-radius: 10px;
 background: linear-gradient(90deg, #FFFFFF 0%, var(--c4) 100%);
 font-weight: bold;
}
.split-grid {
 display: grid;
 grid-template-columns: 1fr 1fr;
 gap: 10px;
 margin-bottom: 9px;
}
.mini-card {
 padding: 10px 12px;
 border: 1px solid #DDE5EC;
 border-radius: 10px;
 background: #FFFFFF;
 min-height: 78px;
}
.mini-card .section-title { margin-bottom: 6px; }
.mini-card .section-body { font-size: 11.85px; line-height: 1.56; }
.skills-card {
 padding: 10px 12px;
 border: 1px solid #DDE5EC;
 border-radius: 10px;
 background: #FFFFFF;
 min-height: 78px;
}
.pill-row {
 display: flex;
 gap: 6px;
 flex-wrap: wrap;
 justify-content: center;
 align-items: center;
 text-align: center;
 padding-top: 2px;
}
.pill {
 display: inline-flex;
 align-items: center;
 justify-content: center;
 text-align: center;
 font-size: 10.7px;
 background: #F7F9FB;
 color: #1E2D3D;
 border: 1px solid var(--c3);
 border-radius: 20px;
 padding: 3px 9px;
 font-weight: bold;
 line-height: 1.25;
}
.outcome-card {
 padding: 10px 12px;
 border: 1px solid #DDE5EC;
 border-radius: 10px;
 background: #FFFFFF;
 min-height: 78px;
}
.outcome-card .section-body {
 font-size: 11.9px;
 line-height: 1.56;
 font-weight: bold;
}
.outcome-box-grid {
 display: grid;
 grid-template-columns: repeat(2, minmax(0, 1fr));
 gap: 7px;
 margin-top: 2px;
}
.outcome-item {
 min-height: 40px;
 padding: 7px 8px;
 border-radius: 10px;
 border: 1px solid var(--c3);
 background: #F8FAFC;
 color: #1E2D3D;
 display: flex;
 align-items: center;
 justify-content: center;
 text-align: center;
 font-size: 11.4px;
 line-height: 1.32;
 font-weight: 800;
}

.course-grid .outcome-box-grid {
 grid-template-columns: 1fr;
 gap: 5px;
}
.course-grid .outcome-item {
 min-height: 28px;
 padding: 5px 8px;
 font-size: 11.15px;
 line-height: 1.25;
}
.course-description .section-body p {
 margin: 0 0 10px;
}
.course-description .section-body p:last-of-type {
 margin-bottom: 0;
}
.inline-outcomes-wrap {
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px dashed #D6E0E8;
}
.inline-outcomes-label {
  margin-bottom: 6px;
  font-size: 10.4px;
  font-weight: 900;
  color: var(--c0);
  line-height: 1.15;
}
.inline-outcomes-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 5px;
}
.inline-outcomes-grid .outcome-item {
  flex: 0 1 118px;
  min-width: 112px;
  max-width: 132px;
  min-height: 30px;
  padding: 5px 7px;
  border-radius: 8px;
  border: 1px solid var(--c3);
  background: #F8FAFC;
  color: #1E2D3D;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 10.25px;
  line-height: 1.18;
  font-weight: 800;
}
.full-width-card {
 margin-bottom: 9px;
}
.school-card {
 padding: 10px 13px;
 border: 1px solid #D8E1E8;
 border-radius: 10px;
 background: #FAFBFC;
}

.syllabus-wrap {
 margin-bottom: 9px;
 background: #FFFFFF;
 border: 1px solid #DDE5EC;
 border-radius: 10px;
 overflow: hidden;
}
.syllabus-header {
 font-size: 11px;
 font-weight: 900;
 color: var(--c0);
 background: #F8FAFC;
 border-bottom: 1px solid #E3E9EF;
 border-right: 5px solid var(--c1);
 padding: 6px 12px;
 line-height: 1.25;
}
.syllabus-table {
 width: 100%;
 border-collapse: collapse;
 font-size: 11.7px;
}
.syllabus-table th {
 background: var(--c0);
 color: #FFFFFF;
 font-size: 10.6px;
 padding: 5px 8px;
 font-weight: bold;
 text-align: center;
 line-height: 1.3;
 border-left: 1px solid #DDE5EC;
 border-bottom: 1px solid #DDE5EC;
 -webkit-print-color-adjust: exact;
 print-color-adjust: exact;
}
.syllabus-table th:last-child { text-align: right; border-left: none; }
.syllabus-table th:first-child { text-align: center; width: 36px; }
.syllabus-table td {
 padding: 5px 8px;
 border-bottom: 1px solid #E4EAEF;
 border-left: 1px solid #E4EAEF;
 vertical-align: top;
 line-height: 1.42;
}
.syllabus-table td:last-child { border-left: none; }
.syllabus-table tr:last-child td { border-bottom: none; }
.syllabus-table tr:nth-child(even) td { background: #FAFBFC; }
.syl-num {
 color: var(--c0);
 font-weight: bold;
 width: 48px;
 text-align: center;
}
.syl-topic {
 font-weight: bold;
 color: #1E2D3D;
 width: 138px;
 text-align: right;
}
.syl-desc { color: #3C4854; text-align: right; }

.section-body { white-space: pre-line; }
.course-main-grid {
 display: grid;
 grid-template-columns: 1fr 1fr;
 gap: 10px;
 margin-bottom: 9px;
}
.course-card {
 break-inside: avoid;
}
.course-description .section-body {
 column-count: 2;
 column-gap: 18px;
 column-rule: 1px solid #E4EAEF;
 font-size: 11.35px;
 line-height: 1.45;
}
.course-card .section-body {
 font-size: 11.6px;
 line-height: 1.47;
}
.course-card.idea-card .section-body {
 font-weight: 600;
}
.course-grid .section-body {
 font-size: 11.25px;
 line-height: 1.45;
}
.badge strong {
 font-weight: 900;
 color: var(--c0);
}

.a4-footer {
 margin-top: auto;
 padding: 8px 10mm;
 background: #F8FAFC;
 border-top: 1px solid #E1E7ED;
 display: flex;
 justify-content: center;
 align-items: center;
 text-align: center;
}
.a4-footer-brand {
 font-size: 9px;
 color: #516170;
 font-weight: bold;
 text-align: center;
}

.a4-contact {
 text-align: center;
 font-size: 12.5px;
 font-weight: 700;
 color: #1e3a5f;
 direction: rtl;
 letter-spacing: 0.01em;
 padding: 0 10mm 6px;
}

.print-btn {
  margin-top: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
}
.print-btn button {
 font-size: 14px;
 padding: 10px 28px;
 border: none;
 border-radius: 8px;
 background: #3A5068;
 color: #fff;
 cursor: pointer;
 font-family: "Assistant", Arial, sans-serif;
 font-weight: bold;
}
.print-btn button:hover { opacity: 0.85; }
.back-btn {
  display: inline-block;
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid #C7D1DA;
  background: #fff;
  color: #3A4E62;
  text-decoration: none;
  font-family: "Assistant", Arial, sans-serif;
  font-weight: bold;
  white-space: nowrap;
  transition: all .15s;
}
.back-btn:hover { background: #EEF2F5; border-color: #9AAAB8; }

.catalog-toolbar {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 10002;
  display: none;
  gap: 8px;
  align-items: center;
  padding: 8px;
  border: 1px solid #D8E1E8;
  border-radius: 999px;
  background: rgba(255,255,255,.94);
  box-shadow: 0 4px 14px rgba(0,0,0,0.10);
}
body.catalog-view .catalog-toolbar { display: flex; }
.catalog-toolbar .back-btn { font-size: 12px; }
.catalog-print-btn {
  border: 0;
  border-radius: 999px;
  padding: 6px 14px;
  background: #3A5068;
  color: #fff;
  font: 800 12px "Assistant", Arial, sans-serif;
  cursor: pointer;
}
.catalog-opening-frame {
  width: 210mm;
  min-width: 210mm;
  max-width: 210mm;
  height: 297mm;
  min-height: 297mm;
  max-height: 297mm;
  border: 0;
  display: block;
  margin: 0 auto;
  background: #fff;
  box-shadow: 0 4px 18px rgba(0,0,0,0.08);
  page-break-after: always;
  break-after: page;
  overflow: hidden;
}
body.catalog-view #a4-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}
body.catalog-view .page-wrap { gap: 22px; }
body.catalog-view .a4 { margin-bottom: 22px; }

@media print {
 @page { size: A4; margin: 0; }
 .nav, .print-btn, .nav-toggle, .catalog-gen-link, .catalog-toolbar { display: none !important; }
 html, body { width: 210mm; margin: 0; padding: 0; background: #fff; }
 .page-wrap { padding: 0; }
 .a4 {
 width: 210mm;
 max-width: 210mm;
 box-shadow: none;
 border-radius: 0;
 border: none;
 page-break-after: always;
 min-height: 297mm;
 padding-top: 9mm;
 }
 .top-meta-label {
 max-width: calc(100% - 20mm);
 margin: 0 auto 5mm;
 box-shadow: none;
 }
 .a4-opening { width: calc(100% - 20mm); margin: 0 10mm 5mm; }
 .a4-banner { width: calc(100% - 20mm); margin: 0 10mm 6mm; }
}
@page { size: A4; margin: 0; }

/* Cleaner printed course layout: fewer framed sections */
.course-clean-section {
  margin-bottom: 8px;
  padding: 0 2px;
  background: transparent;
  border: none;
  border-radius: 0;
}

.course-clean-section .section-title {
  margin-bottom: 4px;
}

.course-clean-section .section-body {
  padding: 0;
  background: transparent;
  border: none;
}

.course-clean-core {
  margin-bottom: 8px;
  padding: 7px 10px;
  background: #F8FAFC;
  border-right: 4px solid var(--c2);

}

.course-clean-core .section-body {
  padding: 0;
}

  border: 1px solid #D8E1E8;

  padding: 0;

  gap: 0;

<body>
<button class="nav-toggle" type="button" aria-label="פתיחת רשימת קורסים" aria-expanded="false">☰</button>
<div class="catalog-toolbar" id="catalogToolbar" aria-label="פעולות קטלוג קורסים">
  <a class="back-btn" href="./workshops.html?catalog=courses">← חזרה לבחירה</a>
  <button class="catalog-print-btn" type="button" onclick="window.print()">🖨 הדפסה / PDF</button>
</div>
<div class="nav-overlay" aria-hidden="true"></div>
<div class="nav" id="nav"></div>
<div class="page-wrap">
 <div id="a4-container"></div>
 <div class="print-btn">
   <a class="back-btn" href="./workshops.html?catalog=courses">← חזרה</a>
 </div>
</div>
<script>
let programs = [];

const LOGO = "logo.png";

function escapeHtml(value) {
 return String(value ?? "")
 .replace(/&/g, "&amp;")
 .replace(/</g, "&lt;")
 .replace(/>/g, "&gt;")
 .replace(/"/g, "&quot;")
 .replace(/'/g, "&#039;");
}

function stableProgramId(program = {}) {
 const explicitId = String(program.id ?? "").trim();
 if (explicitId) return explicitId;
 const gefen = String(program.gefen ?? "").trim();
 if (gefen) return `gefen-${gefen.replace(/\s+/g, "-")}`;
 return String(program.title ?? "program")
   .trim()
   .toLowerCase()
   .replace(/[^\p{L}\p{N}]+/gu, "-")
   .replace(/^-+|-+$/g, "") || "program";
}

function normalizeProgram(program = {}) {
 const textFields = ["gefen", "activityNo", "catalogSection", "itemType", "title", "subtitle", "grades", "domain", "sessions", "duration", "opening", "core", "short", "goals", "flow", "develops", "outcome", "school"];
 const normalized = { ...program };
 textFields.forEach(field => { normalized[field] = String(program[field] ?? ""); });
 normalized.id = stableProgramId(program);
 normalized.audienceLevel = String(program.audienceLevel ?? "").trim();
 normalized.skills = Array.isArray(program.skills) ? program.skills.filter(Boolean) : [];
 normalized.skillGroups = Array.isArray(program.skillGroups) ? program.skillGroups.filter(g => g && typeof g === "object" && g.title) : [];
 normalized.syllabus = Array.isArray(program.syllabus) ? program.syllabus : [];
 normalized.c0 = program.c0 || "#2F6F68";
 normalized.c1 = program.c1 || "#3B8C7F";
 normalized.c2 = program.c2 || "#6FAFA5";
 normalized.c3 = program.c3 || "#CFE7E1";
 normalized.c4 = program.c4 || "#EEF8F5";
 normalized.c5 = program.c5 || normalized.c0;
 normalized.c6 = program.c6 || normalized.c1;
 normalized.courseLayout = Boolean(program.courseLayout);
 normalized.showLearningFlow = Boolean(program.showLearningFlow);
 normalized.showInlineOutcomes = Boolean(program.showInlineOutcomes);
 return normalized;
}

function setActiveNav(index) {
 const activeId = index >= 0 && programs[index] ? programs[index].id : null;
 document.querySelectorAll(".nav-btn").forEach(btn => {
   btn.classList.toggle("active", btn.dataset.programId === activeId);
 });
}

function buildNav(activeIndex = 0) {
 const nav = document.getElementById("nav");
 nav.innerHTML = "";
 const activeProgram = programs[activeIndex];
 const activeId = activeProgram ? activeProgram.id : null;
 const activeLevel = activeProgram ? activeProgram.audienceLevel : "";

 const levels = [
   { label: "יסודי",  keys: ["elementary", "elementary-middle"] },
   { label: "חטיבה", keys: ["middle", "middle-high"] },
   { label: "תיכון",  keys: ["high", "high-middle"] },
 ];

 const activeGroup = levels.find(({ keys }) => keys.includes(activeLevel));
 const keysToShow = activeGroup ? activeGroup.keys : levels.flatMap(l => l.keys);

 const group = programs.filter(p => keysToShow.includes(p.audienceLevel));
 group.forEach(p => {
   const btn = document.createElement("button");
   btn.className = "nav-btn" + (p.id === activeId ? " active" : "");
   btn.style.setProperty('--c0', p.c0);
   btn.style.setProperty('--c1', p.c1);
   btn.style.setProperty('--c3', p.c3);
   btn.style.setProperty('--c4', p.c4);
   btn.textContent = p.title;
   btn.dataset.programId = p.id;
   btn.onclick = () => selectProgram(programs.indexOf(p), true);
   nav.appendChild(btn);
 });

 const footer = document.createElement("div");
 footer.className = "nav-pdf-footer";
 const pdfBtn = document.createElement("button");
 pdfBtn.className = "nav-pdf-btn";
 pdfBtn.type = "button";
 pdfBtn.textContent = "PDF";
 pdfBtn.addEventListener("click", () => {
   nav.classList.remove("open");
   document.querySelector(".nav-overlay")?.classList.remove("open");
   document.body.classList.remove("nav-open");
   setTimeout(() => window.print(), 120);
 });
 footer.appendChild(pdfBtn);
 nav.appendChild(footer);
}

function findProgramIndexFromUrl() {
 const params = new URLSearchParams(window.location.search);
 const requestedId = params.get("id");
 const requestedGefen = params.get("gefen");
 if (requestedId) return programs.findIndex(program => program.id === requestedId);
 if (requestedGefen) return programs.findIndex(program => String(program.gefen) === requestedGefen);
 return 0;
}

function selectProgram(index, pushUrl = false) {
 if (index < 0 || index >= programs.length) return;
 render(index);
 setActiveNav(index);
 scheduleA4Fit();
 if (pushUrl) {
   const url = `./course-page.html?id=${encodeURIComponent(programs[index].id)}`;
   history.pushState({ programId: programs[index].id }, "", url);
 }
}

function buildSkills(p) {
 const items = Array.isArray(p.skills) && p.skills.length ? p.skills : String(p.develops || "").split(",").map(s => s.trim()).filter(Boolean);
 return items.map(s => `<span class="pill">${escapeHtml(s)}</span>`).join("");
}

function buildSkillsTags(p) {
 const items = Array.isArray(p.skills) && p.skills.length ? p.skills : String(p.develops || "").split(",").map(s => s.trim()).filter(Boolean);
 return `<div class="skills-tags">${items.map(item => `<span class="skill-tag">${escapeHtml(item)}</span>`).join("")}</div>`;
}

function getOutcomeItems(p) {
 return String(p.outcome || "").split(/\n|•/).map(s => s.trim()).filter(Boolean);
}

function buildOutcome(p, mode = "default") {
 const items = getOutcomeItems(p);
 if (items.length > 1) {
 const gridClass = mode === "inline" ? "inline-outcomes-grid" : "outcome-box-grid";
 return `<div class="${gridClass}">${items.map(item => `<div class="outcome-item">${escapeHtml(item)}</div>`).join("")}</div>`;
 }
 return `<div class="section-body">${escapeHtml(p.outcome || "")}</div>`;
}

function hexToRgbString(hex) {
 const clean = String(hex || "").replace("#", "").trim();
 if (!/^[0-9a-fA-F]{6}$/.test(clean)) return "78,104,128";
 const r = parseInt(clean.slice(0, 2), 16);
 const g = parseInt(clean.slice(2, 4), 16);
 const b = parseInt(clean.slice(4, 6), 16);
 return `${r},${g},${b}`;
}

function cleanGradeLabel(value) {
 return String(value || "").replace(/^כיתות\s+/, "").trim();
}

function buildTopMetaLabel(p) {
 const items = [
 `<span class="meta-main">מספר גפ״ן ${escapeHtml(p.gefen)}</span>`,
 `<span class="meta-value">${escapeHtml(cleanGradeLabel(p.grades))}</span>`,
 `<span class="meta-value">${escapeHtml(p.sessions)}</span>`,
 `<span class="meta-value">${escapeHtml(p.duration)}</span>`
 ];
 return `<div class="top-meta-row"><img class="top-meta-logo" src="${LOGO}" alt="לוגו תעשיידע"><div class="top-meta-label">${items.map((item, index) => index > 0 ? `<span class="meta-separator"></span>${item}` : item).join("")}</div></div>`;
}

function buildLearningFlow() {
 const steps = ["חוקרים", "מתכננים", "מפתחים", "משפרים", "מציגים"];
 return `<div class="learning-flow-strip">${steps.map(step => `<div class="learning-flow-step">${escapeHtml(step)}</div>`).join("")}</div>`;
}

function buildSkillsGroups(p) {
 if (Array.isArray(p.skillGroups) && p.skillGroups.length) {
   const cards = p.skillGroups.map(group => {
     const title = escapeHtml(group.title || "");
     const items = Array.isArray(group.items)
       ? group.items.map(item => `<div class="skill-group-item">${escapeHtml(item)}</div>`).join("")
       : "";
     return `<div class="skill-group-card"><div class="skill-group-title">${title}</div><div class="skill-group-items">${items}</div></div>`;
   }).join("");
   return `<div class="skills-group-grid">${cards}</div>`;
 }
 return buildSkillsTags(p);
}


function syllabusStageClass(n) {
 const num = Number(n);
 if (num >= 1 && num <= 4) return "stage-nature";
 if (num >= 5 && num <= 6) return "stage-tech";
 if (num >= 7 && num <= 10) return "stage-product";
 return "";
}

function buildCourseDescription(p) {
 const paragraphs = String(p.goals || "").split(/\n\s*\n/).map(s => s.trim()).filter(Boolean);
 let html = p.showLearningFlow ? buildLearningFlow() : "";
 html += paragraphs.map(par => `<p>${escapeHtml(par)}</p>`).join("");
 if (p.showInlineOutcomes) {
   html += `<div class="inline-outcomes-wrap"><div class="inline-outcomes-label">תוצרי סיום</div>${buildOutcome(p, "inline")}</div>`;
 }
 return html || escapeHtml(p.goals || "");
}

function buildSyllabus(p) {
 const rows = Array.isArray(p.syllabus) ? p.syllabus : [];
 if (!rows.length) return '';
 return `<div class="syllabus-wrap">
 <div class="syllabus-header">סילבוס הקורס</div>
 <table class="syllabus-table">
 <thead><tr><th>מפגש</th><th style="text-align:right">נושא</th><th style="text-align:right">תיאור</th></tr></thead>
 <tbody>${rows.map(r=>`<tr class="${syllabusStageClass(r.n)}">
 <td class="syl-num">${escapeHtml(r.n)}</td>
 <td class="syl-topic">${escapeHtml(r.topic)}</td>
 <td class="syl-desc">${escapeHtml(r.desc)}</td>
 </tr>`).join('')}</tbody>
 </table></div>`;
}

function contactLineHTML(marketer) {
 if (marketer === "yael") {
   return `<div class="a4-contact">לפרטים נוספים: יעל אביב &nbsp;–&nbsp; 054-7790073 &nbsp;|&nbsp; <a href="mailto:yael_aviv@think.org.il" style="color:inherit;text-decoration:none;">yael_aviv@think.org.il</a></div>`;
 }
 if (marketer === "israa") {
   return `<div class="a4-contact">לפרטים נוספים: איסראא אבו-ראס &nbsp;–&nbsp; 054-5419396 &nbsp;|&nbsp; <a href="mailto:esraas@think.org.il" style="color:inherit;text-decoration:none;">esraas@think.org.il</a></div>`;
 }
 return "";
}

function buildProgramPageHtml(p, marketer = "none") {
 const style = `--c0:${p.c0};--c1:${p.c1};--c2:${p.c2};--c3:${p.c3};--c4:${p.c4};--c5:${p.c5};--c6:${p.c6};--theme-rgb:${hexToRgbString(p.c1)}`;
 const contactLine = contactLineHTML(marketer);

 if (p.courseLayout) {
 return `
 <div class="a4" style="${style}">
 ${buildTopMetaLabel(p)}
 <p class="a4-opening">${escapeHtml(p.opening)}</p>
 <div class="a4-banner">
 <div class="a4-banner-text">
 <h1 class="a4-title">${escapeHtml(p.title)}</h1>
 <p class="a4-subtitle">${escapeHtml(p.subtitle)}</p>
 <div class="a4-badges">
 <span class="badge badge-domain">${escapeHtml(p.domain)}</span>
 </div>
 </div>
 </div>
 <div class="a4-body">
 <section class="info-section text-only-section course-summary">
 <div class="section-title">תקציר</div>
 <div class="section-body">${escapeHtml(p.short)}</div>
 </section>

 }

 return `

 </div>
 </div>`;
}

function render(i) {
 const p = programs[i];
 if (!p) return;
 document.getElementById("a4-container").innerHTML = buildProgramPageHtml(p);
}

function findProgramIndexesFromUrl() {
 const params = new URLSearchParams(window.location.search);
 const ids = String(params.get("ids") || "").split(",").map(id => id.trim()).filter(Boolean);
 if (!ids.length) return [];
 const requested = new Set(ids);
 return programs.map((program, index) => requested.has(program.id) ? index : -1).filter(index => index >= 0);
}

function isCatalogModeFromUrl() {
 const params = new URLSearchParams(window.location.search);
 return params.get("catalog") === "1" || params.has("ids");
}

function buildIndexPageHtml(selectedPrograms) {
  const levelLabel = { elementary: "יסודי", "elementary-middle": "יסודי–חטיבה", middle: "חטיבה", "middle-high": "חטיבה–תיכון", high: "תיכון" };
  const rows = selectedPrograms.map(p => `
    <tr>
      <td class="idx-title">${escapeHtml(p.title || "—")}</td>
      <td class="idx-level">${escapeHtml(levelLabel[p.audienceLevel] || p.catalogSection || "—")}</td>
      <td class="idx-grades">${escapeHtml(p.grades || "—")}</td>
      <td class="idx-sessions">${escapeHtml(p.sessions || "—")}</td>
      <td class="idx-gefen">${escapeHtml(String(p.gefen || p.activityNo || "—"))}</td>
    </tr>`).join("");
  return `
  <div class="a4 index-page" style="page-break-after:always;break-after:page;">
    <div class="idx-header">
      <img class="idx-logo" src="logo.png" alt="תעשיידע">
      <div>
        <div class="idx-main-title">מקרא: תוכניות תעשיידע</div>
        <div class="idx-sub-title">רשימת התוכניות הנכללות בקטלוג זה</div>
      </div>
    </div>
    <div class="idx-body">
      <table class="idx-table">
        <thead>
          <tr>
            <th class="idx-title">שם התוכנית</th>
            <th class="idx-level">שכבת גיל</th>
            <th class="idx-grades">כיתות</th>
            <th class="idx-sessions">מפגשים</th>
            <th class="idx-gefen">גפ״ן</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="a4-footer">
      <span class="a4-footer-brand">© כל הזכויות שמורות לתעשיידע – תעשייה למען חינוך מתקדם ע״ר</span>
    </div>
  </div>`;
}

function renderCourseCatalog(indexes, includeCover = false, includeIndex = false, marketer = "none") {
 const selectedPrograms = indexes.map(index => programs[index]).filter(Boolean);
 document.body.classList.add("catalog-view", "catalog-courses-print");
 document.querySelector(".nav-toggle")?.setAttribute("hidden", "hidden");
 document.getElementById("nav")?.setAttribute("hidden", "hidden");
 const openingSrc = marketer && marketer !== "none" ? `./opening.html?marketer=${encodeURIComponent(marketer)}` : "./opening.html";
 const openingHtml = includeCover ? `<iframe class="catalog-opening-frame" src="${openingSrc}" title="מכתב מקדים לקטלוג הקורסים"></iframe>` : "";
 const indexHtml = includeIndex ? buildIndexPageHtml(selectedPrograms) : "";
 document.getElementById("a4-container").innerHTML = openingHtml + indexHtml + selectedPrograms.map(p => buildProgramPageHtml(p, marketer)).join("");
 scheduleA4Fit();
}

function showLoadError(msg, showBackLink = false) {
  const backLink = showBackLink ? `<br><br><a href="./workshops.html?catalog=courses" style="display:inline-block;padding:10px 16px;border-radius:999px;background:#203b7a;color:#fff;text-decoration:none;">חזרה לבחירת קורסים</a>` : "";
  document.getElementById("a4-container").innerHTML =
    `<div style="direction:rtl;font-family:"Assistant",Arial,sans-serif;padding:40px;color:#c0392b;font-size:15px;text-align:center;">
      <strong>שגיאה בטעינת הנתונים</strong><br><br>${msg}${backLink}
    </div>`;
}

function showProgramNotFound() {
  showLoadError("התוכנית המבוקשת לא נמצאה בקובץ הנתונים.", true);
}

async function init() {
  try {
    const res = await fetch("catalog-data.json", { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!Array.isArray(data.programs) || data.programs.length === 0) {
      showLoadError("קובץ catalog-data.json ריק או חסר שדה programs.");
      return;
    }
    const levelOrder = { elementary: 1, "elementary-middle": 2, middle: 3, "middle-high": 4, high: 5 };
    programs = data.programs.map(program => normalizeProgram(program))
      .sort((a, b) => (levelOrder[a.audienceLevel] ?? 99) - (levelOrder[b.audienceLevel] ?? 99));
    if (isCatalogModeFromUrl()) {
      const params = new URLSearchParams(window.location.search);
      const requestedIndexes = findProgramIndexesFromUrl();
      if (!requestedIndexes.length) {
        showLoadError("לא נבחרו קורסים תקינים להפקת קטלוג.", true);
        return;
      }
      renderCourseCatalog(requestedIndexes, params.get("cover") === "1", params.get("index") === "1", params.get("marketer") || "none");
      return;
    }
    const requestedIndex = findProgramIndexFromUrl();
    setupCourseDrawer();
    if (requestedIndex === -1) {
      buildNav();
      showProgramNotFound();
      return;
    }
    buildNav(requestedIndex);
    selectProgram(requestedIndex, false);
  } catch (err) {
    showLoadError("לא ניתן לטעון את נתוני הקטלוג. בדקו שקובץ catalog-data.json קיים ותקין.<br><small>" + err.message + "</small>");
  }
}

function setupCourseDrawer() {
 const toggle = document.querySelector(".nav-toggle");
 const nav = document.querySelector(".nav");
 const overlay = document.querySelector(".nav-overlay");
 if (!toggle || !nav || !overlay) return;

 const closeDrawer = () => {
   nav.classList.remove("open");
   overlay.classList.remove("open");
   document.body.classList.remove("nav-open");
   toggle.setAttribute("aria-expanded", "false");
 };

 const openDrawer = () => {
   nav.classList.add("open");
   overlay.classList.add("open");
   document.body.classList.add("nav-open");
   toggle.setAttribute("aria-expanded", "true");
 };

 toggle.addEventListener("click", () => {
   if (nav.classList.contains("open")) closeDrawer();
   else openDrawer();
 });

 overlay.addEventListener("click", closeDrawer);

 document.addEventListener("keydown", (event) => {
   if (event.key === "Escape") closeDrawer();
 });

 nav.addEventListener("click", (event) => {
   if (event.target.closest(".nav-btn")) closeDrawer();
 });
}


init();

function fitA4Page() {
 const pages = document.querySelectorAll(".a4");
 const warning = document.getElementById("fit-warning");
 if (!pages.length) return;
 if (warning) warning.classList.remove("show");

 const modes = ["fit-spacious", "fit-normal", "fit-compact", "fit-tight", "fit-ultra"];
 let hasOverflow = false;
 pages.forEach(a4 => {
   a4.classList.remove(...modes);
   a4.classList.add("fit-spacious");

   const tolerance = 2;
   const fits = () => a4.scrollHeight <= a4.clientHeight + tolerance;

   if (!fits()) {
     a4.classList.remove("fit-spacious");
     a4.classList.add("fit-normal");
   }

   if (!fits()) {
     a4.classList.remove("fit-normal");
     a4.classList.add("fit-compact");
   }

   if (!fits()) {
     a4.classList.remove("fit-compact");
     a4.classList.add("fit-tight");
   }

   if (!fits()) {
     a4.classList.remove("fit-tight");
     a4.classList.add("fit-ultra");
   }

   if (!fits()) hasOverflow = true;
 });

 if (hasOverflow && warning) {
   warning.classList.add("show");
 }
}

function scheduleA4Fit() {
 requestAnimationFrame(() => {
   fitA4Page();
   setTimeout(fitA4Page, 80);
   setTimeout(fitA4Page, 250);
 });
}

window.addEventListener("resize", scheduleA4Fit);
window.addEventListener("beforeprint", fitA4Page);
window.addEventListener("popstate", () => {
 const index = findProgramIndexFromUrl();
 if (index === -1) {
   showProgramNotFound();
   setActiveNav(-1);
   return;
 }
 selectProgram(index, false);
});


document.addEventListener("click", function(event) {
 const courseButton = event.target.closest(".nav-btn");
 if (courseButton) {
   setTimeout(scheduleA4Fit, 0);
 }
});

</script>
